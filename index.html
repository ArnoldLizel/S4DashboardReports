<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Philippine Navy - Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #dde8f8;
      --primary:   #5b7fff; --primary-b: #3a5dd4; --primary-sh: rgba(91,127,255,0.42);
      --green:     #34c97e; --green-b:   #1fa85e;
      --red:       #f0506e; --red-b:     #c82d4a;
      --text:      #1e2340; --text2: #5a5f82; --muted: #9098c0;
      --white:     #ffffff; --surface: #f0f4ff;
      --r-xl:28px; --r-lg:20px; --r-md:14px; --r-pill:50px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      height:100%; font-family:'Nunito',sans-serif; overflow:hidden;
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 20%,rgba(91,127,255,.18) 0%,transparent 55%),
        radial-gradient(ellipse at 85% 80%,rgba(52,201,126,.14) 0%,transparent 55%),
        radial-gradient(ellipse at 70% 10%,rgba(240,80,110,.10) 0%,transparent 45%);
    }
    .blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:floatBlob 7s ease-in-out infinite;}
    .blob-1{width:260px;height:260px;top:-80px;left:-80px;background:rgba(91,127,255,.13);animation-delay:0s;}
    .blob-2{width:180px;height:180px;bottom:40px;right:-60px;background:rgba(52,201,126,.12);animation-delay:2.5s;}
    .blob-3{width:140px;height:140px;top:50%;left:10%;background:rgba(240,80,110,.09);animation-delay:1.5s;}
    @keyframes floatBlob{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-28px) scale(1.04);}}

    .main-container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;position:relative;z-index:1;}

    .login-wrapper{
      display:flex; width:100%; max-width:880px; height:540px;
      background:var(--white); border-radius:var(--r-xl);
      border:3px solid rgba(255,255,255,.95);
      box-shadow:0 14px 0 0 rgba(91,127,255,.18),0 24px 60px rgba(91,127,255,.15),inset 0 2px 8px rgba(255,255,255,1);
      overflow:hidden;
      animation:popIn .6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn{from{opacity:0;transform:translateY(28px) scale(.93)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* Form panel */
    .form-panel{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:44px 48px;background:var(--white);position:relative;z-index:2;
    }
    .form-panel::before{
      content:'';position:absolute;top:0;left:0;right:0;height:40%;
      background:linear-gradient(180deg,rgba(240,244,255,.7) 0%,transparent 100%);
      border-radius:var(--r-xl) 0 0 0;pointer-events:none;
    }
    .form-title{font-family:'Sora',sans-serif;font-size:1.75rem;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:4px;position:relative;z-index:1;}
    .form-subtitle{font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:22px;position:relative;z-index:1;}

    .social-container{display:flex;gap:12px;margin-bottom:18px;position:relative;z-index:1;}
    .social-icon{
      width:40px;height:40px;border-radius:var(--r-md);
      display:flex;justify-content:center;align-items:center;cursor:pointer;color:var(--text2);
      background:linear-gradient(145deg,var(--surface),#e8eeff);
      border:2px solid rgba(255,255,255,.9);
      box-shadow:0 4px 0 0 rgba(91,127,255,.15),0 6px 14px rgba(91,127,255,.10),inset 0 1px 4px rgba(255,255,255,.9);
      transition:all .22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .social-icon:hover{color:var(--primary);transform:translateY(-4px) scale(1.08);box-shadow:0 8px 0 0 rgba(91,127,255,.18),0 12px 22px rgba(91,127,255,.15),inset 0 1px 4px rgba(255,255,255,.9);}
    .social-icon:active{transform:translateY(2px) scale(.95);}

    .divider{font-size:.72rem;font-weight:700;color:var(--muted);margin:12px 0;position:relative;z-index:1;width:100%;text-align:center;}

    .input-group{width:100%;margin-bottom:13px;position:relative;z-index:1;}
    input[type="text"],input[type="password"],input[type="email"]{
      width:100%;padding:13px 18px;border-radius:var(--r-md);
      background:linear-gradient(145deg,var(--surface),#eef2ff);
      border:2px solid rgba(91,127,255,.15);
      color:var(--text);font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:600;
      box-shadow:inset 0 2px 5px rgba(91,127,255,.07),0 2px 0 0 rgba(91,127,255,.08);
      transition:all .2s;outline:none;
    }
    input:focus{
      border-color:var(--primary);background:var(--white);
      box-shadow:0 0 0 4px rgba(91,127,255,.12),inset 0 2px 5px rgba(91,127,255,.05),0 4px 0 0 rgba(91,127,255,.12);
      transform:translateY(-1px);
    }

    .autocomplete-dropdown{
      position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);
      border-radius:var(--r-md);border:2px solid rgba(91,127,255,.15);
      max-height:200px;overflow-y:auto;z-index:1000;
      box-shadow:0 8px 0 0 rgba(91,127,255,.12),0 14px 30px rgba(91,127,255,.12);
      display:none;
    }
    .autocomplete-item{padding:10px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.88rem;font-weight:600;color:var(--text);transition:background .15s;border-radius:var(--r-md);}
    .autocomplete-item:hover{background:var(--surface);}
    .autocomplete-item-remove{color:var(--red);font-size:.82rem;}

    .options-row{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;position:relative;z-index:1;}
    .remember-me{display:flex;align-items:center;gap:8px;font-size:.82rem;font-weight:700;color:var(--text2);cursor:pointer;}
    .remember-me input[type="checkbox"]{width:17px;height:17px;cursor:pointer;accent-color:var(--primary);}
    .forgot-password{font-size:.78rem;font-weight:700;color:var(--muted);text-decoration:none;transition:color .2s;}
    .forgot-password:hover{color:var(--primary);}

    button[type="submit"]{
      width:100%;padding:13px;border-radius:var(--r-pill);
      background:linear-gradient(145deg,#7090ff,var(--primary-b));
      color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.98rem;letter-spacing:.04em;
      cursor:pointer;border:none;
      box-shadow:0 7px 0 0 rgba(58,93,212,.45),0 12px 26px rgba(91,127,255,.30),inset 0 2px 6px rgba(255,255,255,.25);
      transition:all .22s cubic-bezier(0.34,1.56,0.64,1);position:relative;z-index:1;overflow:hidden;
    }
    button[type="submit"]:hover:not(:disabled){transform:translateY(-4px) scale(1.02);box-shadow:0 11px 0 0 rgba(58,93,212,.45),0 18px 36px rgba(91,127,255,.32),inset 0 2px 6px rgba(255,255,255,.28);}
    button[type="submit"]:active:not(:disabled){transform:translateY(4px) scale(.98);box-shadow:0 2px 0 0 rgba(58,93,212,.45),0 4px 12px rgba(91,127,255,.2),inset 0 2px 6px rgba(255,255,255,.15);}
    button[type="submit"]:disabled{background:linear-gradient(145deg,#b8c4e8,#a0accc);box-shadow:0 5px 0 0 rgba(100,110,160,.3),0 8px 18px rgba(100,110,160,.15);cursor:not-allowed;}
    button[type="submit"]::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);transition:left .5s ease;}
    button[type="submit"]:hover::before{left:160%;}

    .error-message{
      width:100%;background:linear-gradient(145deg,#fff0f3,#ffe4ea);
      border:2px solid rgba(240,80,110,.3);color:var(--red-b);padding:11px 16px;
      border-radius:var(--r-md);margin-bottom:12px;font-size:.82rem;font-weight:700;
      box-shadow:0 4px 0 0 rgba(200,45,74,.15),0 6px 14px rgba(200,45,74,.08);
      display:none;position:relative;z-index:1;animation:shake .5s ease;
    }
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

    .loading-spinner{display:inline-block;width:15px;height:15px;border:2.5px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .footer-text{margin-top:16px;font-size:.70rem;font-weight:700;color:var(--muted);position:relative;z-index:1;}

    /* Hero panel */
    .hero-panel{
      width:340px;flex-shrink:0;
      background:linear-gradient(145deg,#6b90ff,#4a6de8,#3a55c8);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:48px 36px;position:relative;overflow:hidden;
    }
    .hero-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent);border-radius:0 var(--r-xl) 0 0;pointer-events:none;}
    .hero-panel::after{content:'';position:absolute;bottom:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none;}
    .hero-blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.09);}
    .hero-blob-1{width:100px;height:100px;top:15%;right:-30px;}
    .hero-blob-2{width:60px;height:60px;bottom:20%;left:-15px;}

    .logo-display{display:flex;gap:18px;margin-bottom:28px;justify-content:center;align-items:center;position:relative;z-index:1;}
    .logo-ring{
      width:72px;height:72px;border-radius:50%;
      background:rgba(255,255,255,.20);border:3px solid rgba(255,255,255,.5);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 7px 0 0 rgba(0,0,0,.12),0 12px 24px rgba(0,0,0,.15),inset 0 2px 6px rgba(255,255,255,.4);
      transition:all .3s cubic-bezier(0.34,1.56,0.64,1);overflow:hidden;
    }
    .logo-ring:hover{transform:translateY(-5px) scale(1.06);}
    .logo-ring img{width:100%;height:100%;object-fit:contain;}

    .hero-title{font-family:'Sora',sans-serif;font-size:1.7rem;font-weight:800;color:#fff;text-align:center;margin-bottom:14px;letter-spacing:-.02em;text-shadow:0 3px 10px rgba(0,0,0,.15);position:relative;z-index:1;}
    .hero-desc{font-size:.86rem;font-weight:600;color:rgba(255,255,255,.82);text-align:center;line-height:1.65;position:relative;z-index:1;}
    .hero-desc strong{color:#fff;font-weight:800;}
    .hero-pills{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1;}
    .hero-pill{font-size:.65rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;background:rgba(255,255,255,.18);color:rgba(255,255,255,.90);border:2px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:50px;box-shadow:0 3px 0 0 rgba(0,0,0,.10),0 5px 12px rgba(0,0,0,.08);}

    @media(max-width:700px){.login-wrapper{flex-direction:column;height:auto;}.hero-panel{width:100%;padding:32px;}.form-panel{padding:32px 28px;}}
  </style>
</head>
<body>

  <div class="main-container">

      <div class="form-panel">
        <form id="loginForm" style="width:100%;display:flex;flex-direction:column;align-items:center;">

          <div class="social-container">
            <div class="social-icon" title="Google"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div>

            <div class="social-icon" title="GitHub"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></div>

          </div>
          <div class="divider">— or use your email —</div>
          <div id="error-message" class="error-message"></div>
          <div class="input-group">
            <input type="email" id="username" placeholder="Email address" required autocomplete="email"/>
            <div id="autocomplete-dropdown" class="autocomplete-dropdown"></div>
          </div>
          <div class="input-group">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password"/>
          </div>
          <div class="options-row">
            <label class="remember-me"><input type="checkbox" id="rememberMe"/><span>Remember me</span></label>
            <a href="#" class="forgot-password">Forgot password?</a>

          <button type="submit" id="login-btn">Sign In</button>
          <p class="footer-text">Authorized Personnel Only &nbsp;|&nbsp; Philippine Navy © 2025</p>
        </form>
      </div>
      <!-- Hero -->
      <div class="hero-panel">
        <div class="hero-blob hero-blob-1"></div><div class="hero-blob hero-blob-2"></div>
        <div class="logo-display">
          <div class="logo-ring"><img src="image/hsg1.png" alt="Navy Logo" onerror="this.style.display='none'"/></div>
          <div class="logo-ring"><img src="image/pinas.png" alt="AFP Logo" onerror="this.style.display='none'"/></div>
        </div>
        <h1 class="hero-title">Welcome Back!</h1>
        <p class="hero-desc">Enter your credentials to access the<br><strong>Logistics – Headquarters Service Group</strong><br>Secure Portal</p>
        <div class="hero-pills"><span class="hero-pill">🔒 Secure</span><span class="hero-pill">⚓ Navy</span><span class="hero-pill">📋 Portal</span></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const supabase = createClient("https://jdzfxfriydakuqegtahq.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U");
    const MAX_ATTEMPTS=5,LOCKOUT_DURATION=15*60*1000,ATTEMPT_WINDOW=5*60*1000;
    const getSavedEmails=()=>{const s=localStorage.getItem('saved_emails');return s?JSON.parse(s):[];};
    const saveEmail=e=>{let a=getSavedEmails().filter(x=>x!==e);a.unshift(e);localStorage.setItem('saved_emails',JSON.stringify(a.slice(0,5)));};
    const removeEmail=e=>{localStorage.setItem('saved_emails',JSON.stringify(getSavedEmails().filter(x=>x!==e)));};
    const loadRememberedUser=()=>{const r=localStorage.getItem('remembered_user');if(r){const{email,timestamp}=JSON.parse(r);if(Date.now()-timestamp<30*24*60*60*1000){document.getElementById('username').value=email;document.getElementById('rememberMe').checked=true;}else localStorage.removeItem('remembered_user');}};
    const usernameInput=document.getElementById('username'),dropdown=document.getElementById('autocomplete-dropdown');
    const showAutocomplete=()=>{const emails=getSavedEmails();if(!emails.length){dropdown.style.display='none';return;}const q=usernameInput.value.toLowerCase();const f=emails.filter(e=>e.toLowerCase().includes(q));if(!f.length){dropdown.style.display='none';return;}dropdown.innerHTML=f.map(e=>`<div class="autocomplete-item" data-email="${e}"><span>${e}</span><span class="autocomplete-item-remove" data-remove="${e}">✕</span></div>`).join('');dropdown.style.display='block';};
    usernameInput.addEventListener('focus',showAutocomplete);usernameInput.addEventListener('input',showAutocomplete);
    dropdown.addEventListener('click',e=>{if(e.target.classList.contains('autocomplete-item-remove')){removeEmail(e.target.dataset.remove);showAutocomplete();}else{const item=e.target.closest('.autocomplete-item');if(item){usernameInput.value=item.dataset.email;dropdown.style.display='none';document.getElementById('password').focus();}}});
    document.addEventListener('click',e=>{if(!usernameInput.contains(e.target)&&!dropdown.contains(e.target))dropdown.style.display='none';});
    const getRateLimitData=()=>{const d=localStorage.getItem('login_attempts');return d?JSON.parse(d):{attempts:[],lockedUntil:null};};
    const saveRateLimitData=d=>localStorage.setItem('login_attempts',JSON.stringify(d));
    const isAccountLocked=()=>{const d=getRateLimitData();if(d.lockedUntil&&Date.now()<d.lockedUntil)return{locked:true,minutesLeft:Math.ceil((d.lockedUntil-Date.now())/60000)};return{locked:false};};
    const recordLoginAttempt=success=>{const d=getRateLimitData();const now=Date.now();d.attempts=d.attempts.filter(t=>now-t<ATTEMPT_WINDOW);if(!success){d.attempts.push(now);if(d.attempts.length>=MAX_ATTEMPTS){d.lockedUntil=now+LOCKOUT_DURATION;d.attempts=[];}}else{d.attempts=[];d.lockedUntil=null;}saveRateLimitData(d);};
    const showError=msg=>{const el=document.getElementById('error-message');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',5000);};
    const setLoading=v=>{const btn=document.getElementById('login-btn');const form=document.getElementById('loginForm');if(v){btn.disabled=true;btn.innerHTML='<span class="loading-spinner"></span>Authenticating…';form.querySelectorAll('input').forEach(i=>i.disabled=true);}else{btn.disabled=false;btn.innerHTML='Sign In';form.querySelectorAll('input').forEach(i=>i.disabled=false);}};
    document.getElementById('loginForm').addEventListener('submit',async e=>{
      e.preventDefault();const ls=isAccountLocked();if(ls.locked){showError(`⚠️ Locked for ${ls.minutesLeft} min.`);return;}
      const email=document.getElementById('username').value.trim(),password=document.getElementById('password').value,remember=document.getElementById('rememberMe').checked;
      if(!email||!password){showError('❌ Please enter both email and password.');return;}
      setLoading(true);
      try{const{data,error}=await supabase.auth.signInWithPassword({email,password});
        if(error||!data.session){recordLoginAttempt(false);const rem=MAX_ATTEMPTS-getRateLimitData().attempts.length;showError(rem>0?`❌ Invalid credentials. ${rem} attempt(s) remaining.`:'⚠️ Account locked for 15 minutes.');setLoading(false);return;}
        recordLoginAttempt(true);saveEmail(email);
        if(remember)localStorage.setItem('remembered_user',JSON.stringify({email,timestamp:Date.now()}));else localStorage.removeItem('remembered_user');
        window.location.href='Dashboard.html';
      }catch(err){console.error(err);showError('❌ Connection error. Please try again.');setLoading(false);}
    });
    window.addEventListener('load',()=>{loadRememberedUser();const ls=isAccountLocked();if(ls.locked){showError(`⚠️ Locked. Try again in ${ls.minutesLeft} minutes.`);document.getElementById('login-btn').disabled=true;}});
    document.querySelectorAll('.social-icon').forEach(i=>i.addEventListener('click',e=>{e.preventDefault();showError('ℹ️ Social login coming soon.');}));
  </script>
</body>
</html>
