<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Philippine Navy - Secure Login</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "Segoe UI", Arial, sans-serif; color: #fff; display: flex; justify-content: center; align-items: center; overflow: hidden;
      background-image: url("image/bg1.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      filter: brightness(0.85);
    }
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }
    .logo-wrapper { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }
    .login-logo { width: 80px; height: 80px; object-fit: contain; }
    .login-container h2 { font-size: 1.4rem; font-weight: 600; color: #e5e7eb; margin-bottom: 25px; line-height: 1.4; }
    label { display: block; text-align: left; color: #d1d5db; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; margin-bottom: 15px; border: 1px solid #374151; border-radius: 6px;
      background: rgba(255, 255, 255, 0.9); color: #111827; font-size: 0.95rem;
    }
    input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: #0b5ed7; box-shadow: 0 0 5px #2563eb; }
    input[type="submit"] { width: 100%; padding: 10px; background-color: #0b5ed7; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease; font-size: 1rem; }
    input[type="submit"]:hover { background-color: #092c79; }
    .footer { margin-top: 20px; font-size: 0.8rem; color: #9ca3af; }
  </style>
</head>

<body>
  <form id="loginForm" class="login-container">
    <div class="logo-wrapper">
      <img src="image/hsg1.png" alt="Navy Logo" class="login-logo" />
      <img src="image/pinas.png" alt="AFP Logo" class="login-logo" />
    </div>
    <h2>LOGISTICS - HEADQUARTERS SERVICE GROUP<br>SECURE ACCESS PORTAL</h2>

    <label for="username">Email</label>
    <input type="text" id="username" name="username" placeholder="Enter Email" required />

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter Password" required />

    <input type="submit" value="Login" />
    <p class="footer">Authorized Personnel Only | Philippine Navy © 2025</p>
  </form>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://jdzfxfriydakuqegtahq.supabase.co"; // ✅ Your Supabase URL
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U"; // ✅ Your Supabase anon key
    const supabase = createClient(supabaseUrl, supabaseKey);

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error || !data.session) {
          alert("❌ Incorrect email or password!");
          return;
        }

        // ✅ Login successful → redirect to dashboard
        window.location.href = "Dashboard.html";
      } catch (err) {
        console.error("Login error:", err);
        alert("❌ Something went wrong. Please try again.");
      }
    });
  </script>
</body>
</html>
