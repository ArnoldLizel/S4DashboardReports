<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HSG Logistics Data Hub – Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --gold:        #c8962a;
      --gold-light:  #f0c060;
      --gold-glow:   #ffdf80;
      --gold-dark:   #7a5010;
      --amber:       #e8840a;
      --panel-bg:    rgba(6, 4, 2, 0.78);
      --panel-border:rgba(180, 130, 40, 0.55);
      --text:        #f0e8d0;
      --text2:       #a89060;
      --muted:       #6a5838;
      --input-bg:    rgba(4, 3, 2, 0.72);
      --input-border:rgba(160, 110, 30, 0.45);
      --red:         #e03030;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Rajdhani', sans-serif; overflow: hidden; }

    /* ── VIDEO BACKGROUND ── */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    /* ── DARK OVERLAY ON TOP OF VIDEO ── */
    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(0, 0, 0, 0.52);
    }

    /* ── SUBTLE VIGNETTE ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
    }

    /* ── SCAN LINES ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
    }

    /* ── PAGE WRAPPER ── */
    .page-center {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 20px;
    }

    /* ── TOP BRAND ── */
    .brand-block {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 18px;
      animation: fadeDown 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-22px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .brand-emblem {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 18px rgba(200,150,40,0.9)) drop-shadow(0 0 40px rgba(200,150,40,0.45));
    }
    .brand-text { text-align: left; }
    .brand-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.05;
      background: linear-gradient(180deg, #ffe88a 0%, #d4960c 45%, #7a5010 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 14px rgba(200,150,40,0.65));
    }
    .brand-subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.54rem;
      font-weight: 500;
      letter-spacing: 0.26em;
      color: var(--text2);
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* ── LOGIN CARD ── */
    .login-card {
      width: 100%;
      max-width: 410px;
      position: relative;
      animation: cardUp 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
    }
    @keyframes cardUp {
      from { opacity:0; transform:scale(0.90) translateY(28px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    /* Gold border glow frame */
    .card-glow-frame {
      position: absolute;
      inset: -2px;
      border-radius: 14px;
      background: linear-gradient(135deg,
        rgba(210,160,45,0.75) 0%,
        rgba(100,65,10,0.25) 35%,
        rgba(190,95,0,0.55) 65%,
        rgba(210,160,45,0.75) 100%
      );
      filter: blur(1px);
      z-index: -1;
    }
    .card-glow-frame::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 18px;
      background: radial-gradient(ellipse at 50% 50%, rgba(200,150,40,0.22) 0%, transparent 70%);
      filter: blur(14px);
    }

    /* Diamond gem topper */
    .gem-topper {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 0 12px rgba(200,150,40,1)) drop-shadow(0 0 28px rgba(200,150,40,0.6));
      animation: gemPulse 3s ease-in-out infinite;
    }
    @keyframes gemPulse {
      0%,100% { filter:drop-shadow(0 0 12px rgba(200,150,40,1)) drop-shadow(0 0 28px rgba(200,150,40,0.6)); }
      50%      { filter:drop-shadow(0 0 22px rgba(255,230,80,1)) drop-shadow(0 0 48px rgba(200,150,40,0.9)); }
    }

    .card-inner {
      background: var(--panel-bg);
      backdrop-filter: blur(32px) saturate(1.5);
      border-radius: 12px;
      border: 1px solid var(--panel-border);
      padding: 36px 38px 30px;
      position: relative;
      overflow: hidden;
    }
    .card-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 12%;
      right: 12%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(240,192,96,0.85), transparent);
    }

    /* Navy org logos */
    .navy-logos { display:flex; gap:14px; justify-content:center; margin-bottom:18px; }
    .navy-logo-ring {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(200,150,40,0.07);
      border: 1px solid rgba(200,150,40,0.42);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 14px rgba(200,150,40,0.18), inset 0 0 8px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .navy-logo-ring img { width:100%; height:100%; object-fit:contain; }
    .navy-logo-ring i { color:var(--gold); font-size:1.2rem; }
    .card-divider {
      height: 1px;
      margin: 0 0 20px;
      background: linear-gradient(90deg,transparent,rgba(200,150,40,0.4),transparent);
    }

    /* ── FORM ── */
    .error-message {
      background: rgba(100,10,10,0.6);
      border: 1px solid rgba(200,50,50,0.5);
      color: #ff8080;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: none;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      25%      { transform:translateX(-6px); }
      75%      { transform:translateX(6px); }
    }
    .input-wrap { position:relative; margin-bottom:13px; }
    .input-label {
      display: block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 6px;
      padding-left: 2px;
    }
    .input-field {
      width: 100%;
      padding: 13px 46px 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    }
    .input-field::placeholder { color:var(--muted); font-weight:400; }
    .input-field:focus {
      border-color: rgba(200,150,40,0.85);
      box-shadow: 0 0 0 3px rgba(200,150,40,0.13), inset 0 2px 8px rgba(0,0,0,0.5);
      background: rgba(8,6,2,0.92);
    }
    .input-icon {
      position: absolute;
      right: 14px;
      bottom: 13px;
      color: var(--text2);
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .input-icon:hover { color:var(--gold-light); }
    .autocomplete-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: rgba(10,8,4,0.98);
      border: 1px solid rgba(180,130,40,0.4);
      border-radius: 6px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 200;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.8);
    }
    .autocomplete-item {
      padding: 9px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      transition: background 0.15s;
    }
    .autocomplete-item:hover { background:rgba(200,150,40,0.08); }
    .autocomplete-item-remove { color:var(--red); }
    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      margin-top: 4px;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .remember-me input[type="checkbox"] {
      width: 15px; height: 15px;
      cursor: pointer;
      accent-color: var(--gold);
    }
    .forgot-link {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--text2);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      transition: color 0.2s;
      letter-spacing: 0.04em;
    }
    .forgot-link:hover { color:var(--gold-light); }

    /* Gold LOG IN button */
    .login-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #1a0e00;
      background: linear-gradient(180deg, #f7d462 0%, #d4920a 35%, #b87000 65%, #e8a820 100%);
      box-shadow:
        0 0 0 1px rgba(240,192,80,0.65),
        0 4px 0 0 rgba(80,40,0,0.85),
        0 6px 22px rgba(200,130,0,0.55),
        inset 0 1px 0 rgba(255,240,140,0.55);
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
      position: relative;
      overflow: hidden;
    }
    .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,200,0.32),transparent);
      transition: left 0.5s ease;
    }
    .login-btn:hover:not(:disabled)::before { left:160%; }
    .login-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow:
        0 0 0 1px rgba(240,192,80,0.85),
        0 7px 0 0 rgba(80,40,0,0.85),
        0 12px 32px rgba(200,130,0,0.65),
        inset 0 1px 0 rgba(255,240,140,0.65);
    }
    .login-btn:active:not(:disabled) {
      transform: translateY(3px);
      box-shadow:
        0 0 0 1px rgba(200,150,40,0.6),
        0 1px 0 0 rgba(80,40,0,0.85),
        0 4px 12px rgba(200,130,0,0.3);
    }
    .login-btn:disabled {
      background: linear-gradient(180deg,#6a5830 0%,#3a3018 100%);
      color: #7a6840;
      cursor: not-allowed;
      box-shadow: 0 3px 0 0 rgba(30,20,0,0.8);
    }
    .loading-spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(20,10,0,0.3);
      border-top-color: #1a0e00;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .register-row {
      text-align: center;
      margin-top: 16px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .register-row strong {
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
      transition: color 0.2s;
    }
    .register-row strong:hover { color:var(--gold-light); }
    .footer-text {
      text-align: center;
      margin-top: 12px;
      font-size: 0.60rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── CORNER DECORATIONS ── */
    .corner-gem {
      position: fixed;
      z-index: 6;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(200,150,40,0.8));
      animation: twinkle 3s ease-in-out infinite;
    }
    .corner-gem-br { bottom:28px; right:28px; animation-delay:0.5s; }
    .corner-gem-tl { top:44px; left:38px; animation-delay:1.3s; opacity:0.45; }
    @keyframes twinkle {
      0%,100% { opacity:0.8; transform:scale(1) rotate(0deg); }
      50%      { opacity:1;   transform:scale(1.2) rotate(15deg); }
    }
  </style>
</head>

      if (!f.length) { dropdown.style.display = 'none'; return; }
      dropdown.innerHTML = f.map(e =>
        `<div class="autocomplete-item" data-email="${e}"><span>${e}</span><span class="autocomplete-item-remove" data-remove="${e}">✕</span></div>`
      ).join('');
      dropdown.style.display = 'block';
    };

    usernameInput.addEventListener('focus', showAutocomplete);
    usernameInput.addEventListener('input', showAutocomplete);

    dropdown.addEventListener('click', e => {
      if (e.target.classList.contains('autocomplete-item-remove')) {
        removeEmail(e.target.dataset.remove); showAutocomplete();
      } else {
        const item = e.target.closest('.autocomplete-item');
        if (item) { usernameInput.value = item.dataset.email; dropdown.style.display = 'none'; document.getElementById('password').focus(); }
      }
    });

    document.addEventListener('click', e => {
      if (!usernameInput.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
    });

    const getRateLimitData = () => { const d = localStorage.getItem('login_attempts'); return d ? JSON.parse(d) : { attempts: [], lockedUntil: null }; };
    const saveRateLimitData = d => localStorage.setItem('login_attempts', JSON.stringify(d));
    const isAccountLocked = () => {
      const d = getRateLimitData();
      if (d.lockedUntil && Date.now() < d.lockedUntil) return { locked: true, minutesLeft: Math.ceil((d.lockedUntil - Date.now()) / 60000) };
      return { locked: false };
    };
    const recordLoginAttempt = success => {
      const d = getRateLimitData(); const now = Date.now();
      d.attempts = d.attempts.filter(t => now - t < ATTEMPT_WINDOW);
      if (!success) {
        d.attempts.push(now);
        if (d.attempts.length >= MAX_ATTEMPTS) { d.lockedUntil = now + LOCKOUT_DURATION; d.attempts = []; }
      } else { d.attempts = []; d.lockedUntil = null; }
      saveRateLimitData(d);
    };

    window.showError = msg => {
      const el = document.getElementById('error-message');
      el.textContent = msg; el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    };

    const setLoading = v => {
      const btn = document.getElementById('login-btn');
      const form = document.getElementById('loginForm');
      if (v) {
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span>Authenticating…';
        form.querySelectorAll('input').forEach(i => i.disabled = true);
      } else {
        btn.disabled = false; btn.innerHTML = 'LOG IN';
        form.querySelectorAll('input').forEach(i => i.disabled = false);
      }
    };

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const ls = isAccountLocked();
      if (ls.locked) { showError(`⚠️ Account locked for ${ls.minutesLeft} more minute(s).`); return; }
      const email = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;
      if (!email || !password) { showError('❌ Please enter both email and password.'); return; }
      setLoading(true);
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error || !data.session) {
          recordLoginAttempt(false);
          const d = getRateLimitData(); const rem = MAX_ATTEMPTS - d.attempts.length;
          showError(rem > 0 ? `❌ Invalid credentials. ${rem} attempt(s) remaining.` : '⚠️ Account locked for 15 minutes.');
          setLoading(false); return;
        }
        recordLoginAttempt(true); saveEmail(email);
        if (remember) localStorage.setItem('remembered_user', JSON.stringify({ email, timestamp: Date.now() }));
        else localStorage.removeItem('remembered_user');
        window.location.href = 'Dashboard.html';
      } catch (err) {
        console.error(err); showError('❌ Connection error. Please try again.'); setLoading(false);
      }
    });

    window.addEventListener('load', () => {
      loadRememberedUser();
      const ls = isAccountLocked();
      if (ls.locked) { showError(`⚠️ Locked. Try again in ${ls.minutesLeft} minutes.`); document.getElementById('login-btn').disabled = true; }
    });
  </script>

</body>
</html>
