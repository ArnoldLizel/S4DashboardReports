      background-size: cover;
      background-position: center 30%;
      background-attachment: fixed;
      color: var(--text);
      padding: 0;
      overflow-x: hidden;
    }

    /* Dark overlay on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(5,2,1,0.72) 0%,
          rgba(10,4,2,0.55) 30%,
          rgba(10,4,2,0.78) 70%,
          rgba(5,2,1,0.95) 100%
        );
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .page-wrapper {
      position: relative;
      z-index: 2;
      padding: 28px 28px 80px;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .header-flex::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 320px;
      height: 2px;
      background: linear-gradient(90deg, var(--fire), transparent);
    }

    .title-block { display: flex; align-items: center; gap: 16px; }
    .title-icon {
      width: 52px; height: 52px;
      background: linear-gradient(145deg, var(--ember), var(--fire));
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: #fff;
      box-shadow: 0 0 24px rgba(255,106,0,0.7), 0 0 60px rgba(255,60,0,0.3);
      animation: pulseGlow 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 24px rgba(255,106,0,0.7), 0 0 60px rgba(255,60,0,0.3); }
      50% { box-shadow: 0 0 36px rgba(255,106,0,0.95), 0 0 80px rgba(255,60,0,0.55); }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--text);
      text-shadow: 0 0 20px rgba(255,140,0,0.6), 0 2px 4px rgba(0,0,0,0.8);
      line-height: 1.15;
    }
    h1 span {
      display: block;
      font-size: .75rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      letter-spacing: .25em;
      color: var(--fire2);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .year-badge {
      background: linear-gradient(145deg, rgba(255,80,0,0.15), rgba(20,8,2,0.9));
      border: 1px solid var(--fire);
      border-top-color: var(--fire2);
      color: var(--gold);
      padding: 10px 24px;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: .12em;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      box-shadow: 0 0 18px rgba(255,106,0,0.3), inset 0 1px 0 rgba(255,180,0,0.15);
      text-shadow: 0 0 12px var(--gold);
      transition: all .25s;
    }
    .year-badge:hover {
      background: linear-gradient(145deg, rgba(255,80,0,0.25), rgba(20,8,2,0.95));
      box-shadow: 0 0 30px rgba(255,106,0,0.5);
    }

    /* ─── MAIN PANEL ─── */
    .main-container {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-top: 2px solid rgba(255,106,0,0.6);
      position: relative;
      overflow: hidden;
      animation: slideUp .6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Corner decorations */
    .main-container::before, .main-container::after {
      content: '';
      position: absolute;
      width: 40px; height: 40px;
      border-color: var(--fire);
      border-style: solid;
    }
    .main-container::before {
      top: 0; left: 0;
      border-width: 2px 0 0 2px;
    }
    .main-container::after {
      bottom: 0; right: 0;
      border-width: 0 2px 2px 0;
    }

    /* ─── TABLE ─── */
    .table-responsive { overflow-x: auto; }

    .table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .table thead th {
      background: linear-gradient(180deg, rgba(60,20,5,0.98), rgba(30,10,2,0.98));
      color: var(--fire2);
      padding: 1rem .7rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: .72rem;
      letter-spacing: .14em;
      border: 1px solid rgba(255,80,0,0.18);
      border-bottom: 1px solid rgba(255,106,0,0.4);
      text-align: center;
      white-space: nowrap;
    }

    /* Sub-header rows */
    .sub-header-row td {
      background: linear-gradient(90deg, rgba(255,80,0,0.12), rgba(255,80,0,0.04)) !important;
      color: var(--fire2) !important;
      font-weight: 700;
      font-size: .95rem;
      padding: 12px 1.25rem;
      border-left: 3px solid var(--fire) !important;
      border: 1px solid rgba(255,80,0,0.15);
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,106,0,0.5);
    }

    .table tbody td {
      padding: .6rem .7rem;
      border: 1px solid rgba(255,80,0,0.09);
      vertical-align: top;
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      background: rgba(8,3,1,0.5);
    }
    tbody tr:not(.sub-header-row):hover td {
      background: rgba(255,80,0,0.07);
    }

    /* Column widths */
    .col-nr   { width: 48px;  text-align: center; }
    .col-title{ width: 420px; }
    .col-abc  { width: 120px; }
    .col-date { width: 128px; }
    .col-remarks { width: 250px; }
    .col-action  { width: 60px; text-align: center; }

    .row-number {
      font-family: 'Orbitron', monospace;
      font-size: .75rem;
      font-weight: 700;
      color: var(--fire);
      text-shadow: 0 0 8px rgba(255,106,0,0.5);
    }

    /* ─── INPUTS ─── */
    .form-control {
      width: 100%;
      padding: 8px 10px;
      background: rgba(15,6,2,0.8);
      border: 1px solid rgba(255,80,0,0.2);
      border-radius: 2px;
      font-family: 'Exo 2', sans-serif;
      font-size: .84rem;
      font-weight: 600;
      color: var(--text);
      transition: .2s;
      line-height: 1.4;
      overflow: hidden;
    }
    .form-control:focus {
      background: rgba(25,10,3,0.95);
      border-color: var(--fire);
      outline: none;
      box-shadow: 0 0 0 2px rgba(255,106,0,0.18), 0 0 12px rgba(255,106,0,0.12);
      color: #fff;
    }
    textarea.form-control { min-height: 40px; resize: none; display: block; }

    input[type="date"].form-control::-webkit-calendar-picker-indicator {
      filter: invert(0.7) sepia(1) hue-rotate(-10deg) saturate(3);
      cursor: pointer;
    }

    /* ─── BUTTONS ─── */
    .btn-group {
      display: flex;
      gap: 14px;
      padding: 1.4rem 1.5rem;
      background: rgba(8,3,1,0.7);
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .btn {
      padding: 11px 24px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: .1em;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: all .2s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      transform: translateX(-100%);
      transition: transform .4s;
    }
    .btn:hover::before { transform: translateX(100%); }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
    .btn:active { transform: translateY(1px); }

    .btn-add {
      background: linear-gradient(135deg, #b03000, var(--ember));
      color: #fff;
      box-shadow: 0 4px 0 rgba(180,40,0,0.6), 0 6px 18px rgba(255,60,0,0.3);
    }
    .btn-add:hover { box-shadow: 0 6px 0 rgba(180,40,0,0.6), 0 10px 28px rgba(255,60,0,0.4); }

    .btn-save {
      background: linear-gradient(135deg, #4a6500, #6a9200);
      color: #d4f0a0;
      box-shadow: 0 4px 0 rgba(50,70,0,0.6), 0 6px 18px rgba(100,160,0,0.2);
    }
    .btn-save:hover { box-shadow: 0 6px 0 rgba(50,70,0,0.6), 0 10px 28px rgba(100,160,0,0.3); }

    .btn-reset {
      background: linear-gradient(135deg, #1a2a60, #2a3e8a);
      color: #a0c0ff;
      box-shadow: 0 4px 0 rgba(10,20,80,0.6), 0 6px 18px rgba(40,80,180,0.2);
    }
    .btn-reset:hover { box-shadow: 0 6px 0 rgba(10,20,80,0.6), 0 10px 28px rgba(40,80,180,0.3); }

    /* Delete button */
    .delete-btn {
      background: rgba(180,20,20,0.15);
      border: 1px solid rgba(255,50,50,0.25);
      color: #ff6060;
      width: 32px; height: 32px;
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: .8rem;
      transition: all .18s;
    }
    .delete-btn:hover {
      background: rgba(220,30,30,0.35);
      border-color: rgba(255,60,60,0.6);
      color: #ff9090;
      box-shadow: 0 0 12px rgba(255,40,40,0.3);
      transform: scale(1.12);
    }

    /* ─── PARTICLES (CSS only) ─── */
    .ember {
      position: fixed;
      bottom: -10px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--fire);
      box-shadow: 0 0 6px var(--fire), 0 0 12px var(--fire2);
      animation: floatEmber linear infinite;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
    }
    @keyframes floatEmber {
      0%   { opacity: 0; transform: translateY(0) translateX(0) scale(1); }
      10%  { opacity: 1; }
      80%  { opacity: .7; }
      100% { opacity: 0; transform: translateY(-90vh) translateX(40px) scale(0.2); }
    }
    .ember:nth-child(1)  { left: 5%;   width:3px; height:3px; animation-duration:6s;  animation-delay:0s; }
    .ember:nth-child(2)  { left: 12%;  animation-duration:8s;  animation-delay:1.5s; }
    .ember:nth-child(3)  { left: 25%;  width:5px; height:5px; animation-duration:7s;  animation-delay:0.8s; background:var(--fire2); }
    .ember:nth-child(4)  { left: 38%;  animation-duration:9s;  animation-delay:3s; }
    .ember:nth-child(5)  { left: 52%;  width:3px; height:3px; animation-duration:6.5s;animation-delay:2.1s; }
    .ember:nth-child(6)  { left: 65%;  animation-duration:7.5s;animation-delay:0.4s; background:var(--gold2); }
    .ember:nth-child(7)  { left: 76%;  width:5px; height:5px; animation-duration:8.5s;animation-delay:1.2s; }
    .ember:nth-child(8)  { left: 88%;  animation-duration:6.8s;animation-delay:2.8s; }
    .ember:nth-child(9)  { left: 42%;  width:3px; height:3px; animation-duration:5.5s;animation-delay:4s; background:var(--ember); }
    .ember:nth-child(10) { left: 93%;  animation-duration:9.5s;animation-delay:1.8s; }

    /* ─── DIVIDER GLOW ─── */
    .glow-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--fire), var(--fire2), transparent);
      margin: 0;
      opacity: .6;
    }
  </style>
</head>
<body>

<!-- Floating embers -->
<div class="ember"></div><div class="ember"></div><div class="ember"></div>
<div class="ember"></div><div class="ember"></div><div class="ember"></div>
<div class="ember"></div><div class="ember"></div><div class="ember"></div>
<div class="ember"></div>

<div class="page-wrapper">
  <div class="header-flex">
    <div class="title-block">
      <div class="title-icon"><i class="fas fa-fire"></i></div>
      <h1>
        EPA Procurement Dashboard
        <span>⚔ Annual Procurement Plan · Battlefield Report</span>
      </h1>
    </div>
    <div class="year-badge">FY &nbsp; <span id="currentYearDisplay">----</span></div>
  </div>

  <div class="main-container">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th class="col-nr">#</th>
            <th class="col-title"><i class="fas fa-scroll"></i> &nbsp;Item Title / Project Name</th>
            <th class="col-abc"><i class="fas fa-coins"></i> &nbsp;ABC (₱)</th>
            <th class="col-date">Pre-Proc</th>
            <th class="col-date">Pre-Bid</th>
            <th class="col-date">SOBE</th>
            <th class="col-date">PQ</th>
            <th class="col-date">NOA</th>
            <th class="col-date">NTP</th>
            <th class="col-remarks"><i class="fas fa-comment-dots"></i> &nbsp;Remarks</th>
            <th class="col-action"><i class="fas fa-cog"></i></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="glow-line"></div>
    <div class="btn-group">
      <button class="btn btn-add"  id="addBtn" ><i class="fas fa-plus-circle"></i> Add Item</button>
      <button class="btn btn-save" id="saveBtn"><i class="fas fa-cloud-upload-alt"></i> Save Changes</button>
      <button class="btn btn-reset" id="clearBtn"><i class="fas fa-redo"></i> Reset Year</button>
    </div>
  </div>
</div><!-- page-wrapper -->

<script>
(()=>{
  const SUPABASE_URL="https://jdzfxfriydakuqegtahq.supabase.co";
  const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
  const TABLE="epa_procurement";
  const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  let items=[{text:"Goods and Services",colspan:true}];
  let currentYear=new Date().getFullYear().toString();

  const autoExpand=el=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};

  const render=()=>{
    const tbody=document.getElementById("tableBody");
    document.getElementById("currentYearDisplay").innerText=currentYear;
    tbody.innerHTML="";
    let rowNum=0;
    items.forEach((item,idx)=>{
      const tr=document.createElement("tr");
      if(item.colspan){
        tr.className="sub-header-row";
        tr.innerHTML=`<td colspan="11"><i class="fas fa-fire"></i> &nbsp; ${item.text}</td>`;
      } else {
        rowNum++;
        tr.innerHTML=`
          <td class="col-nr"><span class="row-number">${String(rowNum).padStart(2,'0')}</span></td>
          <td class="col-title"><textarea class="form-control" data-field="title" data-idx="${idx}">${item.title||""}</textarea></td>
          <td class="col-abc"><input type="number" class="form-control" style="text-align:right;" data-field="abc" data-idx="${idx}" value="${item.abc||""}"></td>
          <td class="col-date"><input type="date" class="form-control" data-field="preProc" data-idx="${idx}" value="${item.preProc||""}"></td>
          <td class="col-date"><input type="date" class="form-control" data-field="preBid" data-idx="${idx}" value="${item.preBid||""}"></td>
          <td class="col-date"><input type="date" class="form-control" data-field="sobe" data-idx="${idx}" value="${item.sobe||""}"></td>
          <td class="col-date"><input type="date" class="form-control" data-field="pq" data-idx="${idx}" value="${item.pq||""}"></td>
          <td class="col-date"><input type="date" class="form-control" data-field="noa" data-idx="${idx}" value="${item.noa||""}"></td>
          <td class="col-date"><input type="date" class="form-control" data-field="ntp" data-idx="${idx}" value="${item.ntp||""}"></td>
          <td class="col-remarks"><textarea class="form-control" data-field="remarks" data-idx="${idx}">${item.remarks||""}</textarea></td>
          <td class="col-action" style="text-align:center;"><button class="delete-btn" data-del-idx="${idx}"><i class="fas fa-trash-alt"></i></button></td>`;
      }
      tbody.appendChild(tr);
    });
    document.querySelectorAll('textarea.form-control').forEach(autoExpand);
  };

  document.getElementById("tableBody").addEventListener("input",e=>{
    const{field,idx}=e.target.dataset;
    if(field&&idx)items[idx][field]=e.target.value;
    if(e.target.tagName==='TEXTAREA')autoExpand(e.target);
  });

  document.getElementById("tableBody").addEventListener("click",async e=>{
    const delBtn=e.target.closest('.delete-btn');
    if(delBtn){
      const idx=parseInt(delBtn.dataset.delIdx);
      if(!confirm("Remove this entry from the battlefield?"))return;
      const item=items[idx];
      if(item.id)await supabase.from(TABLE).delete().eq("id",item.id);
      items.splice(idx,1);render();
    }
  });

  async function loadData(){
    const{data}=await supabase.from(TABLE).select("*").eq("year",currentYear).order("item_number");
    if(data&&data.length>0){
      items=[{text:"Goods and Services",colspan:true},...data.map(d=>({id:d.id,title:d.title,abc:d.abc,preProc:d.pre_proc,preBid:d.pre_bid,sobe:d.sobe,pq:d.pq,noa:d.noa,ntp:d.ntp,remarks:d.remarks}))];
    }else{items=[{text:"Goods and Services",colspan:true}];}
    render();
  }

  document.getElementById("saveBtn").onclick=async()=>{
    const rows=items.filter(i=>!i.colspan).map((it,i)=>({item_number:i,title:it.title,abc:it.abc?parseFloat(it.abc):null,pre_proc:it.preProc,pre_bid:it.preBid,sobe:it.sobe,pq:it.pq,noa:it.noa,ntp:it.ntp,remarks:it.remarks,year:parseInt(currentYear),is_header:false}));
    const{error}=await supabase.from(TABLE).upsert(rows,{onConflict:'item_number, year'});
    if(error)alert("Error: "+error.message);
    else alert("✅ Data synchronized for FY "+currentYear);
    loadData();
  };

  document.getElementById("addBtn").onclick=()=>{items.push({title:"",abc:"",preProc:"",preBid:"",sobe:"",pq:"",noa:"",ntp:"",remarks:""});render();};

  document.getElementById("clearBtn").onclick=()=>{
    const y=prompt("Enter new fiscal year:",currentYear);
    if(y&&/^\d{4}$/.test(y)){currentYear=y;loadData();}
  };

  loadData();
})();
</script>
</body>
</html>
