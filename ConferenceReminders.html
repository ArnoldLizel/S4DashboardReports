<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conference Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --clay-blue: #6b9fff;
      --clay-purple: #b39dff;
      --clay-pink: #ff9de2;
      --clay-mint: #7de8c8;
      --clay-peach: #ffb499;
      --bg-main: #eef2ff;
      --shadow-clay: 6px 6px 0px rgba(0,0,0,0.08), 0 20px 60px rgba(107,159,255,0.15);
      --shadow-card: 4px 4px 0px rgba(0,0,0,0.06), 0 12px 40px rgba(107,159,255,0.12);
      --shadow-btn: 3px 3px 0px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f0ff 40%, #fff0f9 100%);
      min-height: 100vh;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #b39dff, #6b9fff);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ff9de2, #ffb499);
      bottom: -80px; right: -80px;
    }

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .clay-header {
      background: linear-gradient(135deg, #fff 0%, #f8f5ff 100%);
      border-radius: 28px;
      padding: 28px 36px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.9);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-title {
      font-size: 1.75rem;
      font-weight: 900;
      color: #3d3058;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.5px;
    }

    .header-icon {
      background: linear-gradient(135deg, var(--clay-blue), var(--clay-purple));
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-btn);
      flex-shrink: 0;
    }

    .header-icon svg { color: white; width: 24px; height: 24px; }

    .header-badge {
      background: linear-gradient(135deg, #f0edff, #e8f0ff);
      color: #7060b0;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.05);
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .section-label {
      font-size: 1.1rem;
      font-weight: 800;
      color: #3d3058;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label .dot {
      width: 10px; height: 10px;
      background: linear-gradient(135deg, var(--clay-blue), var(--clay-purple));
      border-radius: 50%;
    }

    /* Conference cards */
    .conf-card {
      background: linear-gradient(135deg, #fff 0%, #fafaff 100%);
      border-radius: 22px;
      padding: 20px 24px;
      box-shadow: var(--shadow-card);
      border: 2px solid rgba(255,255,255,0.95);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .conf-card:hover {
      transform: translateY(-3px);
      box-shadow: 4px 8px 0px rgba(0,0,0,0.07), 0 20px 50px rgba(107,159,255,0.18);
    }

    .conf-card:last-child { margin-bottom: 0; }

    .date-chip {
      background: linear-gradient(135deg, #eef2ff, #e8f0ff);
      border-radius: 16px;
      padding: 10px 14px;
      text-align: center;
      min-width: 72px;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 2px 2px 0 rgba(107,159,255,0.15);
      flex-shrink: 0;
    }

    .date-chip .month {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--clay-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .date-chip .day {
      font-size: 1.6rem;
      font-weight: 900;
      color: #3d3058;
      line-height: 1.1;
    }

    .conf-info h3 {
      font-size: 1rem;
      font-weight: 800;
      color: #2d2050;
    }

    .conf-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 6px;
    }

    .conf-meta span {
      font-size: 0.8rem;
      color: #7060a0;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .conf-agenda {
      font-size: 0.75rem;
      color: #9080b0;
      margin-top: 6px;
      font-style: italic;
      font-weight: 600;
    }

    .action-btns { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-icon {
      width: 38px; height: 38px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.08);
    }

    .btn-icon:hover { transform: translateY(-2px); box-shadow: 3px 5px 0 rgba(0,0,0,0.1); }

    .btn-edit { background: linear-gradient(135deg, #e8f0ff, #d5e4ff); }
    .btn-edit svg { color: #5580dd; }
    .btn-delete { background: linear-gradient(135deg, #ffe8e8, #ffd5d5); }
    .btn-delete svg { color: #e05050; }

    /* Form panel */
    .form-panel {
      background: linear-gradient(160deg, #fff 0%, #f8f5ff 100%);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.95);
      position: sticky;
      top: 24px;
    }

    .form-panel h2 {
      font-size: 1.05rem;
      font-weight: 900;
      color: #3d3058;
      margin-bottom: 20px;
    }

    .field-group { margin-bottom: 16px; }

    .field-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 800;
      color: #9080b0;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .clay-input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 14px;
      border: 2.5px solid #e8e0ff;
      background: linear-gradient(135deg, #fafaff, #f5f0ff);
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: #3d3058;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: inset 2px 2px 4px rgba(107,159,255,0.08);
    }

    .clay-input:focus {
      border-color: var(--clay-blue);
      box-shadow: inset 2px 2px 4px rgba(107,159,255,0.08), 0 0 0 3px rgba(107,159,255,0.18);
    }

    .clay-input::placeholder { color: #c0b0d8; }

    .clay-textarea {
      resize: none;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #6b9fff, #9b7bff);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      padding: 14px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(107,159,255,0.3), 0 8px 24px rgba(107,159,255,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 4px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 4px 6px 0 rgba(107,159,255,0.35), 0 12px 30px rgba(107,159,255,0.4);
    }

    .btn-submit:active { transform: translateY(0); }

    .btn-cancel {
      width: 100%;
      background: transparent;
      color: #9080b0;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: linear-gradient(135deg, #f5f2ff, #eef2ff);
      border-radius: 22px;
      border: 2.5px dashed #c8baee;
    }

    .empty-state p { color: #a090c0; font-weight: 700; font-size: 0.95rem; }

    .skeleton {
      background: linear-gradient(90deg, #f0ecff 25%, #e8e2ff 50%, #f0ecff 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="clay-header">
      <div class="header-title">
        <div class="header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
        Conference Management
      </div>
      <div class="header-badge">🔄 Synced with Dashboard Widget</div>
    </div>

    <div class="main-grid">
      <div>
        <div class="section-label">
          <span class="dot"></span>
          Scheduled Meetings
        </div>
        <div id="conferenceList">
          <div class="conf-card">
            <div style="flex:1">
              <div class="skeleton" style="height:20px;width:60%;margin-bottom:10px;"></div>
              <div class="skeleton" style="height:14px;width:40%;"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-panel">
        <h2>✨ Event Details</h2>
        <form id="conferenceForm">
          <div class="field-group">
            <label class="field-label">Conference Title</label>
            <input type="text" id="title" placeholder="e.g. Weekly Logistics Sync" class="clay-input">
          </div>
          <div class="field-group">
            <label class="field-label">Date & Time</label>
            <input type="datetime-local" id="datetime" class="clay-input">
          </div>
          <div class="field-group">
            <label class="field-label">Location / Link</label>
            <input type="text" id="location" placeholder="e.g. Zoom / Room A" class="clay-input">
          </div>
          <div class="field-group">
            <label class="field-label">Agenda Notes</label>
            <textarea id="agenda" rows="3" placeholder="Key points to discuss..." class="clay-input clay-textarea"></textarea>
          </div>
          <button type="submit" id="submitBtn" class="btn-submit">💾 SAVE CONFERENCE</button>
          <button type="button" id="cancelBtn" class="btn-cancel" style="display:none;">Cancel Editing</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://jdzfxfriydakuqegtahq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

    const conferenceForm = document.getElementById('conferenceForm');
    const conferenceList = document.getElementById('conferenceList');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    let editingId = null;

    async function loadConferences() {
      const { data, error } = await supabaseClient.from('conferences').select('*').order('datetime', { ascending: true });
      if (error) { conferenceList.innerHTML = `<p style="color:#e05050;font-weight:700;padding:16px;">Error loading data.</p>`; return; }

      conferenceList.innerHTML = '';
      if (!data || data.length === 0) {
        conferenceList.innerHTML = `<div class="empty-state"><p>📅 No conferences scheduled yet.<br>Add one using the form!</p></div>`;
        return;
      }

      data.forEach(conf => {
        const d = new Date(conf.datetime);
        const card = document.createElement('div');
        card.className = 'conf-card';
        card.innerHTML = `
          <div style="display:flex;gap:16px;align-items:center;flex:1;min-width:0;">
            <div class="date-chip">
              <div class="month">${d.toLocaleString('en-US', { month: 'short' })}</div>
              <div class="day">${d.getDate()}</div>
            </div>
            <div style="min-width:0;">
              <h3>${conf.title}</h3>
              <div class="conf-meta">
                <span>🕐 ${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                <span>📍 ${conf.location}</span>
              </div>
              ${conf.agenda ? `<div class="conf-agenda">"${conf.agenda}"</div>` : ''}
            </div>
          </div>
          <div class="action-btns">
            <button class="btn-icon btn-edit" onclick="editConference('${conf.id}')">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            <button class="btn-icon btn-delete" onclick="deleteConference('${conf.id}')">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
          </div>`;
        conferenceList.appendChild(card);
      });
    }

    conferenceForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const datetime = document.getElementById('datetime').value;
      const location = document.getElementById('location').value;
      const agenda = document.getElementById('agenda').value;
      if (!title || !datetime || !location) return alert("Please fill in required fields.");
      submitBtn.disabled = true;
      submitBtn.innerText = "Processing...";
      try {
        if (editingId) {
          await supabaseClient.from('conferences').update({ title, datetime, location, agenda }).eq('id', editingId);
          editingId = null;
        } else {
          await supabaseClient.from('conferences').insert([{ title, datetime, location, agenda }]);
        }
        conferenceForm.reset();
        submitBtn.innerText = "💾 SAVE CONFERENCE";
        cancelBtn.style.display = 'none';
        loadConferences();
      } catch { alert("Error saving data."); }
      finally { submitBtn.disabled = false; }
    });

    window.editConference = async (id) => {
      const { data } = await supabaseClient.from('conferences').select('*').eq('id', id).single();
      if (data) {
        editingId = id;
        document.getElementById('title').value = data.title;
        document.getElementById('datetime').value = data.datetime.substring(0, 16);
        document.getElementById('location').value = data.location;
        document.getElementById('agenda').value = data.agenda || '';
        submitBtn.innerText = "✏️ UPDATE CONFERENCE";
        cancelBtn.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    };

    window.deleteConference = async (id) => {
      if (confirm("Remove this conference?")) {
        await supabaseClient.from('conferences').delete().eq('id', id);
        loadConferences();
      }
    };

    cancelBtn.onclick = () => {
      editingId = null;
      conferenceForm.reset();
      submitBtn.innerText = "💾 SAVE CONFERENCE";
      cancelBtn.style.display = 'none';
    };

    loadConferences();
  </script>
</body>
</html>
