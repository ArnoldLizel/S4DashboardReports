<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N4 Scanned Documents Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --clay-violet: #a78bff;
      --clay-blue: #6b9fff;
      --clay-pink: #ff90cb;
      --clay-mint: #5ddcaa;
      --clay-red: #ff8585;
      --shadow-clay: 6px 6px 0px rgba(0,0,0,0.07), 0 20px 60px rgba(167,139,255,0.14);
      --shadow-card: 3px 3px 0px rgba(0,0,0,0.05), 0 10px 35px rgba(167,139,255,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #f3f0ff 0%, #fff0f9 50%, #eef2ff 100%);
      min-height: 100vh;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #a78bff, #6b9fff);
      top: -100px; left: -60px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ff90cb, #ffb499);
      bottom: -80px; right: -80px;
    }

    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .clay-card {
      background: linear-gradient(160deg, #fff 0%, #fdf8ff 100%);
      border-radius: 28px;
      padding: 28px 32px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.95);
      margin-bottom: 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-title {
      font-size: 1.65rem;
      font-weight: 900;
      color: #2a1a4a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      background: linear-gradient(135deg, var(--clay-violet), var(--clay-pink));
      width: 50px; height: 50px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    }

    /* Status indicator */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 800;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .status-connected { background: linear-gradient(135deg, #edfff7, #d5fff0); color: #0a7a45; }
    .status-error { background: linear-gradient(135deg, #fff0f0, #ffe0e0); color: #c02020; }
    .status-loading { background: linear-gradient(135deg, #f0f0ff, #e8e0ff); color: #5030a0; }

    /* Notification toast */
    .notification {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 18px;
      color: white;
      z-index: 1000;
      font-weight: 800;
      font-size: 0.875rem;
      animation: slideIn 0.3s ease;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.12), 0 12px 30px rgba(0,0,0,0.15);
      border: 2px solid rgba(255,255,255,0.25);
    }
    .notif-success { background: linear-gradient(135deg, #3dbf8a, #2aa070); }
    .notif-error { background: linear-gradient(135deg, #ff6b6b, #e04040); }
    .notif-info { background: linear-gradient(135deg, #6b9fff, #4a7bdd); }
    @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Buttons */
    .btn-test {
      background: linear-gradient(135deg, #ffd166, #ffb347);
      color: #7a4a00;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      padding: 10px 20px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.8);
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-test:hover { transform: translateY(-2px); }

    .section-title {
      font-size: 1.1rem;
      font-weight: 900;
      color: #2a1a4a;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      width: 8px; height: 8px;
      background: linear-gradient(135deg, var(--clay-violet), var(--clay-pink));
      border-radius: 50%;
    }

    /* Upload bar */
    .upload-bar {
      background: linear-gradient(135deg, #f5f0ff, #f0ecff);
      border-radius: 18px;
      border: 2px dashed #c8b8f0;
      padding: 18px 22px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .clay-input-sm {
      padding: 9px 14px;
      border-radius: 12px;
      border: 2px solid #ddd4f8;
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #3d2070;
      outline: none;
      transition: border-color 0.2s;
    }
    .clay-input-sm:focus { border-color: var(--clay-violet); }
    .clay-input-sm::placeholder { color: #c0b0d8; }

    .btn-upload {
      background: linear-gradient(135deg, var(--clay-violet), var(--clay-blue));
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      padding: 10px 22px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-upload:hover { transform: translateY(-2px); }
    .btn-upload:disabled { opacity: 0.6; pointer-events: none; }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e8e0ff;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 10px;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--clay-violet), var(--clay-blue));
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* Table */
    .clay-table-wrap {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 2px solid rgba(255,255,255,0.9);
      overflow-x: auto;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: linear-gradient(135deg, #2a1a4a, #3d2570);
      color: white;
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 14px 14px;
      text-align: left;
    }

    td {
      padding: 12px 14px;
      border-bottom: 1.5px solid #f5f0ff;
      font-size: 0.85rem;
      font-weight: 600;
      color: #3d2570;
      background: white;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdf8ff; }

    .thumbnail {
      width: 52px; height: 52px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid #e8e0ff;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.06);
    }

    .file-icon {
      font-size: 28px;
      display: block;
      text-align: center;
      width: 52px;
    }

    .btn-view {
      display: inline-block;
      background: linear-gradient(135deg, var(--clay-violet), var(--clay-blue));
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-view:hover { transform: translateY(-1px); }

    .btn-remove {
      background: linear-gradient(135deg, #ff8585, #e05555);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-left: 6px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-remove:hover { transform: translateY(-1px); }

    .empty-msg td { text-align: center; padding: 2.5rem; color: #9070c0; font-weight: 700; }
    .loading-msg td { text-align: center; padding: 2.5rem; color: #9070c0; font-weight: 700; }
  </style>
</head>
<body>
  <div class="page-wrap">
    <!-- Header -->
    <div class="clay-card">
      <div class="page-header">
        <div class="header-title">
          <div class="header-icon">📄</div>
          N4 Scanned Documents Dashboard
        </div>
        <button class="btn-test" onclick="testConnection()">🔧 Test Connection</button>
      </div>
    </div>

    <!-- Status -->
    <div id="statusIndicator" class="status-pill status-loading">
      <span id="statusIcon">⏳</span>
      <span id="statusText">Checking connection...</span>
    </div>

    <!-- Upload + Table -->
    <div class="clay-card">
      <div class="section-title">Upload Documents</div>
      <div class="upload-bar">
        <input type="file" id="docInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:600;color:#3d2070;">
        <input type="text" id="categoryInput" placeholder="Category (optional)" class="clay-input-sm">
        <input type="text" id="descriptionInput" placeholder="Description (optional)" class="clay-input-sm" style="flex:1;min-width:160px;">
        <button class="btn-upload" id="uploadBtn" onclick="uploadFiles()">⬆ Upload</button>
      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="clay-table-wrap" style="margin-top:16px;">
        <table id="docTable">
          <thead>
            <tr>
              <th>Preview</th>
              <th>Filename</th>
              <th>Category</th>
              <th>Description</th>
              <th>Date Uploaded</th>
              <th>Size</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr class="loading-msg"><td colspan="7">⏳ Loading files...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = "https://jdzfxfriydakuqegtahq.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const BUCKET_NAME = 'documents';

      window.updateStatus = function(status, text, icon) {
        const el = document.getElementById('statusIndicator');
        el.className = 'status-pill status-' + status;
        document.getElementById('statusText').textContent = text;
        document.getElementById('statusIcon').textContent = icon;
      };

      window.showNotification = function(message, type) {
        const n = document.createElement('div');
        const cls = { success: 'notif-success', error: 'notif-error', info: 'notif-info' }[type] || 'notif-info';
        n.className = 'notification ' + cls;
        n.textContent = message;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 4000);
      };

      window.formatFileSize = function(bytes) {
        if (!bytes) return '—';
        const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
      };

      window.testConnection = async function() {
        updateStatus('loading', 'Testing connection...', '⏳');
        try {
          const result = await db.from('scanned_documents').select('count', { count: 'exact', head: true });
          if (result.error) throw result.error;
          const bucketList = await db.storage.listBuckets();
          const exists = bucketList.data && bucketList.data.some(b => b.name === BUCKET_NAME);
          if (!exists) showNotification('⚠️ Bucket "' + BUCKET_NAME + '" not found.', 'error');
          updateStatus('connected', 'Connected to database', '✅');
          showNotification('✅ Database connection successful!', 'success');
        } catch (err) {
          updateStatus('error', 'Connection failed', '❌');
          showNotification('❌ Connection failed: ' + err.message, 'error');
        }
      };

      window.uploadFiles = async function() {
        const input = document.getElementById('docInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const files = Array.from(input.files);
        if (!files.length) { showNotification('Please select at least one file!', 'error'); return; }
        uploadBtn.disabled = true;
        uploadBtn.textContent = 'Uploading...';
        progressBar.style.display = 'block';
        const category = document.getElementById('categoryInput').value || 'General';
        const description = document.getElementById('descriptionInput').value || '';
        try {
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            progressFill.style.width = ((i + 1) / files.length * 100) + '%';
            const fileName = Date.now() + '_' + file.name;
            const uploadResult = await db.storage.from(BUCKET_NAME).upload(fileName, file, { cacheControl: '3600', upsert: false });
            if (uploadResult.error) throw uploadResult.error;
            const publicUrl = db.storage.from(BUCKET_NAME).getPublicUrl(fileName).data.publicUrl;
            const insertResult = await db.from('scanned_documents').insert([{ file_name: file.name, file_type: file.type, file_size: file.size, file_url: publicUrl, category, description }]).select();
            if (insertResult.error) throw insertResult.error;
          }
          showNotification('✅ ' + files.length + ' file(s) uploaded!', 'success');
          input.value = '';
          document.getElementById('categoryInput').value = '';
          document.getElementById('descriptionInput').value = '';
          loadFiles();
        } catch (err) { showNotification('❌ Upload error: ' + err.message, 'error'); }
        uploadBtn.disabled = false;
        uploadBtn.textContent = '⬆ Upload';
        progressBar.style.display = 'none';
        progressFill.style.width = '0';
      };

      window.addFileRow = function(file) {
        const tbody = document.querySelector('#docTable tbody');
        const row = document.createElement('tr');
        row.dataset.id = file.id;
        let preview = file.file_type && file.file_type.startsWith('image/')
          ? `<img src="${file.file_url}" class="thumbnail" alt="${file.file_name}">`
          : file.file_type === 'application/pdf'
          ? `<span class="file-icon">📄</span>`
          : `<span class="file-icon">📎</span>`;
        row.innerHTML = `
          <td>${preview}</td>
          <td>${file.file_name}</td>
          <td>${file.category || 'N/A'}</td>
          <td>${file.description || 'N/A'}</td>
          <td>${new Date(file.date_uploaded).toLocaleString()}</td>
          <td>${formatFileSize(file.file_size)}</td>
          <td>
            <a href="${file.file_url}" target="_blank" class="btn-view">👁 View</a>
            <button class="btn-remove" onclick="removeFile(${file.id}, '${file.file_url}')">🗑 Remove</button>
          </td>`;
        tbody.appendChild(row);
      };

      window.loadFiles = async function() {
        updateStatus('loading', 'Loading files...', '⏳');
        const tbody = document.querySelector('#docTable tbody');
        tbody.innerHTML = '<tr class="loading-msg"><td colspan="7">⏳ Loading files...</td></tr>';
        try {
          const result = await db.from('scanned_documents').select('*').order('date_uploaded', { ascending: false });
          if (result.error) throw result.error;
          tbody.innerHTML = '';
          if (!result.data || !result.data.length) {
            tbody.innerHTML = '<tr class="empty-msg"><td colspan="7">📂 No documents found. Upload some files to get started!</td></tr>';
            updateStatus('connected', 'Connected — No files', '✅');
            return;
          }
          result.data.forEach(addFileRow);
          updateStatus('connected', 'Connected — ' + result.data.length + ' files', '✅');
        } catch (err) {
          tbody.innerHTML = `<tr class="empty-msg"><td colspan="7" style="color:#c02020;">❌ Error: ${err.message}</td></tr>`;
          updateStatus('error', 'Failed to load files', '❌');
        }
      };

      window.removeFile = async function(fileId, fileUrl) {
        if (!confirm('Delete this file?')) return;
        try {
          const fileName = fileUrl.split('/').pop();
          await db.storage.from(BUCKET_NAME).remove([fileName]);
          const dbResult = await db.from('scanned_documents').delete().eq('id', fileId);
          if (dbResult.error) throw dbResult.error;
          const row = document.querySelector('#docTable tr[data-id="' + fileId + '"]');
          if (row) row.remove();
          showNotification('✅ File deleted!', 'success');
          loadFiles();
        } catch (err) { showNotification('❌ Error: ' + err.message, 'error'); }
      };

      document.addEventListener('DOMContentLoaded', function() {
        testConnection();
        loadFiles();
      });
    })();
  </script>
</body>
</html>
