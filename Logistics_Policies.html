<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logistics & Policies Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <style>
    :root {
      --clay-indigo: #818cf8;
      --clay-sky: #60c8ff;
      --clay-green: #5ddcaa;
      --clay-red: #ff8585;
      --clay-yellow: #ffd166;
      --shadow-clay: 6px 6px 0px rgba(0,0,0,0.07), 0 20px 60px rgba(129,140,248,0.14);
      --shadow-card: 3px 3px 0px rgba(0,0,0,0.05), 0 10px 35px rgba(129,140,248,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #f0f1ff 0%, #eef8ff 50%, #f5fff0 100%);
      min-height: 100vh;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #818cf8, #60c8ff);
      top: -90px; left: -70px;
    }
    body::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #5ddcaa, #ffd166);
      bottom: -70px; right: -60px;
    }

    .page-wrap {
      max-width: 1050px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .clay-header {
      background: linear-gradient(160deg, #fff 0%, #f5f6ff 100%);
      border-radius: 28px;
      padding: 26px 32px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.95);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      background: linear-gradient(135deg, var(--clay-indigo), var(--clay-sky));
      width: 52px; height: 52px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1.65rem;
      font-weight: 900;
      color: #1a1a3a;
      letter-spacing: -0.4px;
    }

    /* Notification toast */
    .notification {
      position: fixed;
      top: 24px; right: 24px;
      padding: 14px 22px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 0.875rem;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.12), 0 12px 30px rgba(0,0,0,0.12);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }
    .notif-success { background: linear-gradient(135deg, #5ddcaa, #3dbf8a); }
    .notif-error   { background: linear-gradient(135deg, #ff8585, #e05555); }
    .notif-info    { background: linear-gradient(135deg, #818cf8, #6060e0); }
    @keyframes slideIn { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Main card */
    .clay-card {
      background: linear-gradient(160deg, #fff 0%, #f5f6ff 100%);
      border-radius: 28px;
      padding: 28px 32px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.95);
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 900;
      color: #1a1a3a;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      width: 8px; height: 8px;
      background: linear-gradient(135deg, var(--clay-indigo), var(--clay-sky));
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Upload area */
    .upload-area {
      background: linear-gradient(135deg, #f0f1ff, #eef5ff);
      border-radius: 18px;
      border: 2px dashed #b8c0f8;
      padding: 16px 20px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-input {
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a1a3a;
      flex: 1;
      min-width: 160px;
    }

    .btn-upload {
      background: linear-gradient(135deg, var(--clay-indigo), var(--clay-sky));
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 800;
      padding: 10px 24px;
      border-radius: 13px;
      border: none;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 rgba(0,0,0,0.13); }
    .btn-upload:disabled { opacity: 0.6; pointer-events: none; }

    .loading-div {
      text-align: center;
      padding: 28px;
      color: #7080c0;
      font-weight: 700;
      font-size: 0.95rem;
    }

    /* Table */
    .clay-table-wrap {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 2px solid rgba(255,255,255,0.9);
      overflow-x: auto;
      margin-top: 8px;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: linear-gradient(135deg, #1a1a4a, #2a2a6a);
      color: white;
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 14px 16px;
      text-align: left;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1.5px solid #f0f1ff;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1a1a3a;
      background: white;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f8ff; }

    .thumbnail {
      width: 52px; height: 52px;
      border-radius: 11px;
      object-fit: cover;
      border: 2px solid #c8ccf8;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.06);
    }
    .file-icon { font-size: 28px; display: block; text-align: center; width: 52px; }
    .file-size-text { color: #7080c0; font-size: 0.82rem; font-weight: 700; }

    .btn-download {
      display: inline-block;
      background: linear-gradient(135deg, var(--clay-green), #3dbf8a);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-download:hover { transform: translateY(-1px); }

    .btn-remove {
      background: linear-gradient(135deg, var(--clay-red), #e05555);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-left: 6px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-remove:hover { transform: translateY(-1px); }
    .btn-remove:disabled { opacity: 0.5; pointer-events: none; }

    .empty-row td { text-align: center; padding: 2.5rem; color: #7080c0; font-weight: 700; }
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- Header -->
    <div class="clay-header">
      <div class="header-icon">🚚</div>
      <div class="header-title">Logistics & Policies Dashboard</div>
    </div>

    <!-- Main Card -->
    <div class="clay-card">
      <div class="section-title">Upload Logistics & Policy Documents</div>

      <div class="upload-area">
        <input type="file" id="docInput" class="file-input" multiple accept=".pdf,.jpg,.jpeg,.png">
        <button class="btn-upload" id="uploadBtn">⬆ Upload</button>
      </div>

      <div id="loadingDiv" class="loading-div" style="display:none;">⏳ Loading documents...</div>

      <div class="clay-table-wrap">
        <table id="docTable">
          <thead>
            <tr>
              <th>Preview</th>
              <th>Filename</th>
              <th>File Size</th>
              <th>Date Uploaded</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function () {
      const SUPABASE_URL = "https://jdzfxfriydakuqegtahq.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
      if (typeof supabase === 'undefined') { alert('Supabase library not loaded.'); return; }
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const BUCKET_NAME = 'logistics_policies';

      function showNotification(message, type = 'success') {
        const n = document.createElement('div');
        const cls = { success: 'notif-success', error: 'notif-error', info: 'notif-info' }[type] || 'notif-info';
        n.className = 'notification ' + cls;
        n.textContent = message;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3500);
      }

      function formatFileSize(bytes) {
        if (!bytes) return '—';
        const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
      }

      async function uploadFiles() {
        const input = document.getElementById('docInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const files = Array.from(input.files);
        if (!files.length) { showNotification("Please select at least one file!", 'error'); return; }
        uploadBtn.disabled = true; uploadBtn.textContent = 'Uploading...';
        try {
          for (const file of files) {
            const ts = Date.now(), rand = Math.random().toString(36).substring(7);
            const ext = file.name.split('.').pop();
            const fileName = `${ts}_${rand}.${ext}`;
            const { error: sErr } = await db.storage.from(BUCKET_NAME).upload(fileName, file);
            if (sErr) throw sErr;
            const { data: urlData } = db.storage.from(BUCKET_NAME).getPublicUrl(fileName);
            const { data: dbData, error: dErr } = await db.from('logistics_policies').insert([{ filename: file.name, file_type: file.type, file_size: file.size, file_url: urlData.publicUrl }]).select();
            if (dErr) throw dErr;
            if (dbData?.[0]) addFileRow(dbData[0]);
          }
          showNotification(`✅ Uploaded ${files.length} file(s)!`, 'success');
          input.value = '';
        } catch (err) { showNotification('❌ Error: ' + err.message, 'error'); }
        finally { uploadBtn.disabled = false; uploadBtn.textContent = '⬆ Upload'; }
      }

      function addFileRow(file) {
        const tbody = document.querySelector('#docTable tbody');
        const row = document.createElement('tr');
        row.dataset.id = file.id;
        let preview = file.file_type?.startsWith('image/')
          ? `<img src="${file.file_url}" class="thumbnail" alt="${file.filename}">`
          : file.file_type === 'application/pdf'
          ? `<span class="file-icon">📄</span>`
          : `<span class="file-icon">📎</span>`;
        row.innerHTML = `
          <td>${preview}</td>
          <td>${file.filename}</td>
          <td class="file-size-text">${formatFileSize(file.file_size)}</td>
          <td>${new Date(file.uploaded_at).toLocaleString()}</td>
          <td>
            <a href="${file.file_url}" target="_blank" class="btn-download">⬇ Download</a>
            <button class="btn-remove" data-id="${file.id}" data-url="${file.file_url}">🗑 Remove</button>
          </td>`;
        row.querySelector('.btn-remove').addEventListener('click', function () {
          removeFile(this.dataset.id, this.dataset.url);
        });
        tbody.appendChild(row);
      }

      async function loadFiles() {
        const loadingDiv = document.getElementById('loadingDiv');
        const tbody = document.querySelector('#docTable tbody');
        loadingDiv.style.display = 'block';
        tbody.innerHTML = '';
        try {
          const { data, error } = await db.from('logistics_policies').select('*').order('uploaded_at', { ascending: false });
          if (error) throw error;
          if (data?.length) data.forEach(addFileRow);
          else tbody.innerHTML = '<tr class="empty-row"><td colspan="5">📂 No documents uploaded yet.</td></tr>';
        } catch (err) { showNotification('❌ Error loading: ' + err.message, 'error'); }
        finally { loadingDiv.style.display = 'none'; }
      }

      async function removeFile(fileId, fileUrl) {
        if (!confirm('Delete this file?')) return;
        const btn = document.querySelector(`#docTable tr[data-id='${fileId}'] .btn-remove`);
        if (btn) { btn.disabled = true; btn.textContent = 'Removing...'; }
        try {
          const parts = fileUrl.split('/');
          const fileName = parts[parts.length - 1];
          const { error: sErr } = await db.storage.from(BUCKET_NAME).remove([fileName]);
          if (sErr) throw sErr;
          const { error: dErr } = await db.from('logistics_policies').delete().eq('id', fileId);
          if (dErr) throw dErr;
          document.querySelector(`#docTable tr[data-id='${fileId}']`)?.remove();
          showNotification('✅ File deleted!', 'success');
        } catch (err) {
          showNotification('❌ Error: ' + err.message, 'error');
          if (btn) { btn.disabled = false; btn.textContent = '🗑 Remove'; }
        }
      }

      loadFiles();
      document.getElementById('uploadBtn').addEventListener('click', uploadFiles);
    });
  </script>
</body>
</html>
