<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yearly Planner 2026 · Activity Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,300;400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #f3f5fc;
      --surface: #ffffff;
      --border:  #e6eaf6;
      --border2: #d3d9ef;
      --text:    #13172e;
      --text2:   #4a5280;
      --muted:   #9aa3c8;
      --sh-sm:   0 2px 14px rgba(19,23,46,.06);
      --sh-md:   0 8px 36px rgba(19,23,46,.11);
      --sh-lg:   0 22px 60px rgba(19,23,46,.16);
      --r:       20px;
      --fd:      'Bricolage Grotesque', sans-serif;
      --fb:      'DM Sans', sans-serif;
      --fm:      'DM Mono', monospace;
      /* quarters */
      --c1s:#5b6cf9; --c1e:#9b8afb;
      --c2s:#0ea87e; --c2e:#34d399;
      --c3s:#f59e0b; --c3e:#fbbf24;
      --c4s:#f4447b; --c4e:#fb7185;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:var(--fb);
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }
    /* mesh background */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 65% 40% at 12% 0%,rgba(91,108,249,.07) 0%,transparent 55%),
        radial-gradient(ellipse 55% 35% at 88% 100%,rgba(244,68,123,.06) 0%,transparent 55%),
        radial-gradient(ellipse 45% 30% at 60% 50%,rgba(14,168,126,.04) 0%,transparent 55%);
    }
    /* dot grid */
    body::after{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(rgba(91,108,249,.08) 1.2px, transparent 1.2px);
      background-size:26px 26px;
    }
    .page{
      position:relative;z-index:1;
      max-width:1440px;margin:0 auto;
      padding:32px 28px 72px;
      display:flex;flex-direction:column;gap:26px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━ HEADER ━━━━━━━━━━━━━━━━━━━━━━━ */
    .hdr{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:20px;}
    .live-tag{
      display:inline-flex;align-items:center;gap:7px;
      font-family:var(--fm);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;
      color:#0ea87e;background:rgba(14,168,126,.09);
      border:1px solid rgba(14,168,126,.22);border-radius:40px;
      padding:4px 13px;margin-bottom:10px;
    }
    .live-dot{width:7px;height:7px;border-radius:50%;background:#0ea87e;animation:lp 2s infinite;}
    @keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(14,168,126,.5)}60%{box-shadow:0 0 0 7px rgba(14,168,126,0)}}
    .hdr-title{
      font-family:var(--fd);font-size:2.25rem;font-weight:800;
      letter-spacing:-.04em;color:var(--text);line-height:1;
    }
    .hdr-title span{color:var(--muted);font-weight:400;}
    .hdr-sub{font-size:.9rem;color:var(--text2);margin-top:6px;}
    /* annual pill */
    .annual{
      display:flex;align-items:center;gap:18px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:18px;padding:16px 22px;
      box-shadow:var(--sh-sm);
      animation:fadeUp .5s ease both;
    }
    .ann-lbl{font-family:var(--fm);font-size:.57rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
    .ann-val{font-family:var(--fd);font-size:2rem;font-weight:800;letter-spacing:-.04em;color:var(--c1s);line-height:1;}
    .ann-sub{font-size:.68rem;color:var(--text2);margin-top:3px;}
    .ring-w{position:relative;width:68px;height:68px;flex-shrink:0;}
    .ring-w svg{transform:rotate(-90deg);}
    .rt{fill:none;stroke:var(--border);stroke-width:5;}
    .rf{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1);}
    .rc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.6rem;color:var(--text2);}

    /* ━━━━━━━━━━━━━━━━━━━━━━━ STAT CARDS ━━━━━━━━━━━━━━━━━━━━━━━ */
    .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
    @media(max-width:1000px){.stat-row{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:580px){.stat-row{grid-template-columns:1fr;}}

    .sc{
      border-radius:22px;padding:24px 22px 20px;
      color:#fff;position:relative;overflow:hidden;cursor:default;
      box-shadow:0 10px 32px rgba(0,0,0,.14);
      animation:fadeUp .5s ease both;
      transition:transform .22s,box-shadow .22s;
    }
    .sc:hover{transform:translateY(-5px);box-shadow:0 22px 52px rgba(0,0,0,.2);}
    .sc::before{content:'';position:absolute;top:-32px;right:-32px;width:114px;height:114px;background:rgba(255,255,255,.14);border-radius:50%;}
    .sc::after{content:'';position:absolute;bottom:-20px;left:-16px;width:82px;height:82px;background:rgba(255,255,255,.08);border-radius:50%;}
    .sc-q1{background:linear-gradient(140deg,var(--c1s),var(--c1e));animation-delay:.04s;}
    .sc-q2{background:linear-gradient(140deg,var(--c2s),var(--c2e));animation-delay:.09s;}
    .sc-q3{background:linear-gradient(140deg,var(--c3s),var(--c3e));animation-delay:.14s;}
    .sc-q4{background:linear-gradient(140deg,var(--c4s),var(--c4e));animation-delay:.19s;}
    .sc-in{position:relative;z-index:1;}
    .sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
    .sc-ico{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;}
    .sc-rw{position:relative;width:44px;height:44px;flex-shrink:0;}
    .sc-rw svg{transform:rotate(-90deg);}
    .srt{fill:none;stroke:rgba(255,255,255,.28);stroke-width:4;}
    .srf{fill:none;stroke:rgba(255,255,255,.9);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1);}
    .sc-rp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.54rem;color:rgba(255,255,255,.9);}
    .sc-num{font-family:var(--fd);font-size:2.5rem;font-weight:800;letter-spacing:-.04em;line-height:1;}
    .sc-num sub{font-size:1rem;opacity:.7;vertical-align:baseline;}
    .sc-lbl{font-size:.82rem;font-weight:500;opacity:.88;margin-top:5px;}
    .sc-mo{font-family:var(--fm);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;opacity:.65;margin-top:10px;}
    .sc-bt{margin-top:14px;height:4px;background:rgba(255,255,255,.28);border-radius:4px;overflow:hidden;}
    .sc-bf{height:100%;background:rgba(255,255,255,.92);border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1);}

    /* ━━━━━━━━━━━━━━━━━━━━━━━ PANELS ━━━━━━━━━━━━━━━━━━━━━━━ */
    .panels{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
    @media(max-width:1100px){.panels{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:600px){.panels{grid-template-columns:1fr;}}

    .pnl{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);overflow:hidden;
      display:flex;flex-direction:column;
      box-shadow:var(--sh-sm);
      animation:fadeUp .5s ease both;
      transition:box-shadow .2s,border-color .2s,transform .2s;
    }
    .pnl:hover{box-shadow:var(--sh-md);border-color:var(--border2);transform:translateY(-2px);}
    .pnl:nth-child(1){animation-delay:.06s;}
    .pnl:nth-child(2){animation-delay:.11s;}
    .pnl:nth-child(3){animation-delay:.16s;}
    .pnl:nth-child(4){animation-delay:.21s;}

    .p-stripe{height:5px;}
    .ps-q1{background:linear-gradient(90deg,var(--c1s),var(--c1e));}
    .ps-q2{background:linear-gradient(90deg,var(--c2s),var(--c2e));}
    .ps-q3{background:linear-gradient(90deg,var(--c3s),var(--c3e));}
    .ps-q4{background:linear-gradient(90deg,var(--c4s),var(--c4e));}

    .p-hd{padding:18px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .p-hd-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
    .p-badge{
      font-family:var(--fm);font-size:.56rem;font-weight:500;
      letter-spacing:.13em;text-transform:uppercase;
      padding:4px 11px;border-radius:40px;border:1.5px solid;
      display:inline-block;margin-bottom:7px;
    }
    .p-title{font-family:var(--fd);font-size:.96rem;font-weight:700;color:var(--text);}
    .ai-btn{
      width:34px;height:34px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      border-radius:11px;border:1.5px solid var(--border);
      background:var(--bg);cursor:pointer;color:var(--muted);
      position:relative;transition:all .18s;
    }
    .ai-btn:hover{background:var(--surface);border-color:var(--border2);color:var(--text);box-shadow:var(--sh-sm);}
    .ai-btn:disabled{opacity:.4;cursor:default;}
    .ai-glow{position:absolute;inset:-2px;border-radius:13px;opacity:0;background:linear-gradient(135deg,var(--c1s),var(--c4s));z-index:-1;transition:opacity .2s;}
    .ai-btn:hover .ai-glow{opacity:.15;}

    .p-prog{display:flex;align-items:center;gap:8px;}
    .p-pt{flex:1;height:5px;background:var(--border);border-radius:5px;overflow:hidden;}
    .p-pf{height:100%;border-radius:5px;transition:width .7s cubic-bezier(.4,0,.2,1);}
    .p-pp{font-family:var(--fm);font-size:.57rem;color:var(--muted);min-width:28px;text-align:right;}
    .p-cnt{font-family:var(--fm);font-size:.56rem;background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:2px 9px;border-radius:40px;}

    .t-list{flex:1;overflow-y:auto;padding:8px;max-height:280px;}
    .t-list::-webkit-scrollbar{width:4px;}
    .t-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

    .t-row{
      display:flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:12px;margin-bottom:3px;
      border:1px solid transparent;background:transparent;
      transition:background .15s,border-color .15s;
    }
    .t-row:hover{background:var(--bg);border-color:var(--border);}
    .t-row.dn{opacity:.5;}
    .t-num{font-family:var(--fm);font-size:.54rem;color:var(--muted);min-width:16px;text-align:right;flex-shrink:0;}
    .t-cb{
      width:17px;height:17px;border-radius:5px;flex-shrink:0;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      border:1.5px solid var(--border2);background:var(--surface);
      transition:all .15s;
    }
    .t-cb.on{border-color:currentColor;}
    .t-cb svg{display:none;}
    .t-cb.on svg{display:block;}
    .t-inp{flex:1;background:transparent;border:none;outline:none;font-family:var(--fb);font-size:.83rem;color:var(--text);min-width:0;}
    .t-inp::placeholder{color:var(--muted);}
    .t-inp.sx{text-decoration:line-through;color:var(--muted);}
    .t-pill{
      font-family:var(--fm);font-size:.52rem;letter-spacing:.06em;
      text-transform:uppercase;padding:3px 9px;border-radius:40px;
      border:1.5px solid;cursor:pointer;transition:all .15s;flex-shrink:0;
    }
    .t-pill.pend{color:var(--muted);border-color:var(--border);background:transparent;}
    .t-del{
      width:22px;height:22px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      border-radius:7px;border:none;background:transparent;
      cursor:pointer;color:var(--muted);opacity:0;transition:all .15s;
    }
    .t-row:hover .t-del{opacity:1;}
    .t-del:hover{background:#fde8ee;color:var(--c4s);}
    .t-empty{padding:38px 14px;text-align:center;color:var(--muted);font-size:.8rem;}
    .t-empty svg{margin:0 auto 12px;opacity:.25;display:block;}
    .t-hint{font-size:.66rem;margin-top:4px;opacity:.6;}
    .p-ft{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;}
    .add-btn{
      width:100%;padding:10px;
      border:1.5px dashed var(--border);border-radius:12px;
      background:transparent;cursor:pointer;
      font-family:var(--fm);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text2);transition:all .2s;
      display:flex;align-items:center;justify-content:center;gap:7px;
    }
    .add-btn:hover{background:var(--bg);border-color:var(--border2);color:var(--text);}

    /* ━━━━━━━━━━━━━━━━━━━━━━━ ANALYTICS ━━━━━━━━━━━━━━━━━━━━━━━ */
    .analytics{display:grid;grid-template-columns:5fr 4fr;gap:16px;}
    @media(max-width:820px){.analytics{grid-template-columns:1fr;}}

    .ap{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:26px 28px;
      box-shadow:var(--sh-sm);
      animation:fadeUp .5s ease .3s both;
    }
    .ap-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;}
    .ap-title{font-family:var(--fd);font-size:1rem;font-weight:700;color:var(--text);}
    .ap-sub{font-size:.72rem;color:var(--text2);margin-top:3px;}
    .ap-badge{
      font-family:var(--fm);font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;
      padding:4px 10px;border-radius:40px;background:var(--bg);
      border:1px solid var(--border);color:var(--text2);
    }

    /* donut */
    .donut-wrap{display:flex;align-items:center;gap:28px;}
    .donut-cont{position:relative;width:150px;height:150px;flex-shrink:0;}
    .donut-svg{width:150px;height:150px;transform:rotate(-90deg);}
    .dtr{fill:none;stroke:var(--border);stroke-width:14;}
    .dar{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1);}
    .d-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .d-big{font-family:var(--fd);font-size:1.8rem;font-weight:800;color:var(--text);line-height:1;}
    .d-sm{font-size:.6rem;color:var(--muted);margin-top:3px;}
    .legend{flex:1;display:flex;flex-direction:column;gap:13px;}
    .lg-row{display:flex;align-items:center;gap:10px;}
    .lg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
    .lg-name{font-size:.78rem;color:var(--text2);flex:1;}
    .lg-cnt{font-family:var(--fm);font-size:.72rem;font-weight:500;color:var(--text);}
    .lg-pct{font-family:var(--fm);font-size:.62rem;color:var(--muted);min-width:34px;text-align:right;}

    /* bars */
    .barchart{display:flex;flex-direction:column;gap:20px;}
    .bc-lbl{font-family:var(--fd);font-size:.83rem;font-weight:700;color:var(--text);}
    .bc-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
    .bc-stat{font-family:var(--fm);font-size:.62rem;color:var(--text2);}
    .bc-track{height:10px;background:var(--bg);border-radius:10px;overflow:hidden;position:relative;}
    .bc-fill{height:100%;border-radius:10px;position:relative;overflow:hidden;transition:width .9s cubic-bezier(.4,0,.2,1);}
    .bc-fill::after{
      content:'';position:absolute;top:0;left:0;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
      animation:shim 2.4s ease infinite;
    }
    @keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}

    /* ━━━━━━━━━━━━━━━━━━━━━━━ TOAST / LOADER ━━━━━━━━━━━━━━━━━━━━━━━ */
    #toast{
      position:fixed;bottom:24px;right:24px;z-index:300;
      background:var(--text);color:#fff;
      border-radius:14px;padding:12px 22px;
      font-size:.82rem;font-weight:500;
      opacity:0;transform:translateY(12px) scale(.96);
      transition:opacity .25s,transform .25s;
      pointer-events:none;
      box-shadow:0 8px 28px rgba(0,0,0,.25);
    }
    #toast.on{opacity:1;transform:translateY(0) scale(1);}
    #loader{
      position:fixed;inset:0;z-index:400;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
      transition:opacity .4s;
    }
    .ld-ring{
      width:44px;height:44px;
      border:3px solid var(--border);border-top-color:var(--c1s);
      border-radius:50%;animation:spin .8s linear infinite;
    }
    #loader p{font-family:var(--fm);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
    .sp{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px;}
  </style>
</head>
<body>

<div id="loader">
  <div class="ld-ring"></div>
  <p>Syncing with database…</p>
</div>

<div id="toast"></div>

<div class="page">

  <!-- HEADER -->
  <header class="hdr">
    <div>
      <div class="live-tag"><div class="live-dot"></div>Live Database Sync · iAPB 2026</div>
      <h1 class="hdr-title">Yearly Planner <span>2026</span></h1>
      <p class="hdr-sub">Activity Monitoring &amp; Strategic Goal Tracking</p>
    </div>
    <div class="annual">
      <div>
        <div class="ann-lbl">Annual Completion</div>
        <div class="ann-val" id="ann-val">0%</div>
        <div class="ann-sub" id="ann-sub">Loading…</div>
      </div>
      <div class="ring-w">
        <svg viewBox="0 0 68 68" width="68" height="68">
          <defs><linearGradient id="gA" x1="0%"y1="0%"x2="100%"y2="100%"><stop offset="0%" stop-color="#5b6cf9"/><stop offset="100%" stop-color="#0ea87e"/></linearGradient></defs>
          <circle class="rt" cx="34" cy="34" r="28"/>
          <circle id="ann-ring" class="rf" cx="34" cy="34" r="28" stroke="url(#gA)" stroke-dasharray="175.93" stroke-dashoffset="175.93"/>
        </svg>
        <div class="rc" id="ann-rl">0%</div>
      </div>
    </div>
  </header>

  <!-- STAT CARDS -->
  <div class="stat-row" id="stat-row"></div>

  <!-- TASK PANELS -->
  <div class="panels" id="panels"></div>

  <!-- ANALYTICS -->
  <div class="analytics">
    <div class="ap">
      <div class="ap-hdr">
        <div><div class="ap-title">Completion Overview</div><div class="ap-sub">Activity distribution by quarter</div></div>
        <div class="ap-badge">Live</div>
      </div>
      <div class="donut-wrap">
        <div class="donut-cont">
          <svg class="donut-svg" viewBox="0 0 150 150">
            <defs>
              <linearGradient id="dg1" x1="0%"y1="0%"x2="100%"y2="100%"><stop offset="0%" stop-color="#5b6cf9"/><stop offset="100%" stop-color="#9b8afb"/></linearGradient>
              <linearGradient id="dg2" x1="0%"y1="0%"x2="100%"y2="100%"><stop offset="0%" stop-color="#0ea87e"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
              <linearGradient id="dg3" x1="0%"y1="0%"x2="100%"y2="100%"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
              <linearGradient id="dg4" x1="0%"y1="0%"x2="100%"y2="100%"><stop offset="0%" stop-color="#f4447b"/><stop offset="100%" stop-color="#fb7185"/></linearGradient>
            </defs>
            <circle class="dtr" cx="75" cy="75" r="56"/>
            <circle id="da1" class="dar" cx="75" cy="75" r="56" stroke="url(#dg1)" stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
            <circle id="da2" class="dar" cx="75" cy="75" r="56" stroke="url(#dg2)" stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
            <circle id="da3" class="dar" cx="75" cy="75" r="56" stroke="url(#dg3)" stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
            <circle id="da4" class="dar" cx="75" cy="75" r="56" stroke="url(#dg4)" stroke-dasharray="351.86" stroke-dashoffset="351.86"/>
          </svg>
          <div class="d-center"><div class="d-big" id="d-big">0%</div><div class="d-sm">Complete</div></div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>

    <div class="ap">
      <div class="ap-hdr">
        <div><div class="ap-title">Quarter Progress</div><div class="ap-sub">Tasks completed per quarter</div></div>
      </div>
      <div class="barchart" id="barchart"></div>
    </div>
  </div>

</div><!-- /page -->

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://jdzfxfriydakuqegtahq.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
  const GKEY = "AIzaSyAK0To2SHndohnCSzMSKjYLeBWjICNHue4";
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  const QS = [
    {id:'q1',lb:'Q1',mo:'Jan – Mar',title:'1st Quarter Activities',db:'First Quarter',cs:'#5b6cf9',ce:'#9b8afb',sc:'sc-q1',ps:'ps-q1',arc:'da1'},
    {id:'q2',lb:'Q2',mo:'Apr – Jun',title:'2nd Quarter Activities',db:'Second Quarter',cs:'#0ea87e',ce:'#34d399',sc:'sc-q2',ps:'ps-q2',arc:'da2'},
    {id:'q3',lb:'Q3',mo:'Jul – Sep',title:'3rd Quarter Activities',db:'Third Quarter',cs:'#f59e0b',ce:'#fbbf24',sc:'sc-q3',ps:'ps-q3',arc:'da3'},
    {id:'q4',lb:'Q4',mo:'Oct – Dec',title:'4th Quarter Activities',db:'Fourth Quarter',cs:'#f4447b',ce:'#fb7185',sc:'sc-q4',ps:'ps-q4',arc:'da4'},
  ];

  const QI = [
    `<svg width="20"height="20"viewBox="0 0 24 24"fill="none"stroke="white"stroke-width="2"stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`,
    `<svg width="20"height="20"viewBox="0 0 24 24"fill="none"stroke="white"stroke-width="2"stroke-linecap="round"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>`,
    `<svg width="20"height="20"viewBox="0 0 24 24"fill="none"stroke="white"stroke-width="2"stroke-linecap="round"><circle cx="12"cy="12"r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    `<svg width="20"height="20"viewBox="0 0 24 24"fill="none"stroke="white"stroke-width="2"stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16"y1="13"x2="8"y2="13"/><line x1="16"y1="17"x2="8"y2="17"/></svg>`,
  ];

  const IC = {
    ck:`<svg width="10"height="10"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="3"stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>`,
    pl:`<svg width="13"height="13"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2.5"stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
    x: `<svg width="10"height="10"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="2.5"stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>`,
    ai:`<svg width="15"height="15"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="1.8"stroke-linecap="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>`,
  };

  const state={q1:[],q2:[],q3:[],q4:[]};
  let tOut;

  function toast(m){
    const el=document.getElementById('toast');
    el.textContent=m;el.classList.add('on');
    clearTimeout(tOut);tOut=setTimeout(()=>el.classList.remove('on'),2500);
  }

  async function fetchAll(){
    const{data,error}=await sb.from('iapb').select('*').order('id',{ascending:true});
    if(error){console.error(error);return;}
    QS.forEach(q=>state[q.id]=[]);
    data.forEach(row=>{
      const q=QS.find(q=>q.db===row.quarter_implementation);
      if(q)state[q.id].push({id:row.id.toString(),text:row.activity_title||'',done:row.completed===true});
    });
    const ld=document.getElementById('loader');
    ld.style.opacity='0';setTimeout(()=>ld.style.display='none',400);
    renderAll();
  }

  function renderAll(){
    renderHeader();renderStatCards();renderPanels();renderAnalytics();
  }

  function renderHeader(){
    const tot=QS.reduce((s,q)=>s+state[q.id].length,0);
    const dn=QS.reduce((s,q)=>s+state[q.id].filter(a=>a.done).length,0);
    const pct=tot?Math.round(dn/tot*100):0;
    const C=2*Math.PI*28;
    document.getElementById('ann-val').textContent=`${pct}%`;
    document.getElementById('ann-sub').textContent=`${dn} of ${tot} completed`;
    document.getElementById('ann-rl').textContent=`${pct}%`;
    document.getElementById('ann-ring').style.strokeDashoffset=C-(pct/100)*C;
  }

  function renderStatCards(){
    const C=2*Math.PI*17;
    document.getElementById('stat-row').innerHTML=QS.map((q,i)=>{
      const t=state[q.id].length,d=state[q.id].filter(a=>a.done).length;
      const p=t?Math.round(d/t*100):0;
      const off=C-(p/100)*C;
      return`<div class="sc ${q.sc}">
        <div class="sc-in">
          <div class="sc-top">
            <div class="sc-ico">${QI[i]}</div>
            <div class="sc-rw">
              <svg viewBox="0 0 38 38"width="38"height="38">
                <circle class="srt"cx="19"cy="19"r="17"/>
                <circle class="srf"cx="19"cy="19"r="17"stroke-dasharray="${C}"stroke-dashoffset="${off}"/>
              </svg>
              <div class="sc-rp">${p}%</div>
            </div>
          </div>
          <div class="sc-num">${d}<sub>/${t}</sub></div>
          <div class="sc-lbl">${q.title}</div>
          <div class="sc-mo">${q.mo}</div>
          <div class="sc-bt"><div class="sc-bf"style="width:${p}%"></div></div>
        </div>
      </div>`;
    }).join('');
  }

  function renderPanels(){
    const g=document.getElementById('panels');
    g.innerHTML='';
    QS.forEach(q=>g.appendChild(buildPanel(q)));
  }

  function buildPanel(q){
    const qi=QS.indexOf(q);
    const t=state[q.id].length,d=state[q.id].filter(a=>a.done).length;
    const p=t?Math.round(d/t*100):0;
    const el=document.createElement('div');
    el.className='pnl';el.id=`pnl-${q.id}`;
    el.innerHTML=`
      <div class="p-stripe ${q.ps}"></div>
      <div class="p-hd">
        <div class="p-hd-top">
          <div>
            <div class="p-badge"style="color:${q.cs};border-color:${q.cs};background:${h2r(q.cs,.09)}">${q.lb} · ${q.mo}</div>
            <div class="p-title">${q.title}</div>
          </div>
          <button class="ai-btn"id="ai-${q.id}"title="AI Suggestions"><div class="ai-glow"></div>${IC.ai}</button>
        </div>
        <div class="p-prog">
          <div class="p-pt"><div class="p-pf"id="pb-${q.id}"style="width:${p}%;background:linear-gradient(90deg,${q.cs},${q.ce})"></div></div>
          <span class="p-pp"id="pp-${q.id}">${p}%</span>
          <span class="p-cnt"id="pc-${q.id}">${d}/${t}</span>
        </div>
      </div>
      <div class="t-list"id="list-${q.id}"></div>
      <div class="p-ft"><button class="add-btn"id="add-${q.id}">${IC.pl} Add Activity</button></div>`;
    renderList(q,el);
    el.querySelector(`#ai-${q.id}`).addEventListener('click',()=>runAI(qi));
    el.querySelector(`#add-${q.id}`).addEventListener('click',()=>addTask(qi));
    return el;
  }

  function renderList(q,pnl){
    const wrap=pnl?pnl.querySelector(`#list-${q.id}`):document.getElementById(`list-${q.id}`);
    if(!wrap)return;
    const qi=QS.indexOf(q);
    if(!state[q.id].length){
      wrap.innerHTML=`<div class="t-empty"><svg width="28"height="28"viewBox="0 0 24 24"fill="none"stroke="currentColor"stroke-width="1.3"><rect x="3"y="3"width="18"height="18"rx="4"/><path d="M8 12h8M12 8v8"/></svg><div>No activities yet</div><div class="t-hint">Add one or tap ✦ for AI ideas</div></div>`;
      return;
    }
    const ul=document.createElement('ul');ul.style.listStyle='none';
    state[q.id].forEach((a,i)=>{
      const li=document.createElement('li');
      li.className=`t-row${a.done?' dn':''}`;
      li.innerHTML=`
        <span class="t-num">${String(i+1).padStart(2,'0')}</span>
        <div class="t-cb${a.done?' on':''}"style="${a.done?`color:${q.cs}`:''}"> ${a.done?IC.ck:''}</div>
        <input class="t-inp${a.done?' sx':''}"value="${esc(a.text)}"placeholder="Enter activity…"/>
        <button class="t-pill${a.done?'':' pend'}"style="${a.done?`color:${q.cs};border-color:${q.cs};background:${h2r(q.cs,.08)}`:''}">${a.done?IC.ck+' Done':'Pending'}</button>
        <button class="t-del">${IC.x}</button>`;
      li.querySelector('.t-inp').addEventListener('input',e=>saveText(qi,a.id,e.target.value));
      li.querySelector('.t-pill').addEventListener('click',()=>toggle(qi,a.id));
      li.querySelector('.t-cb').addEventListener('click',()=>toggle(qi,a.id));
      li.querySelector('.t-del').addEventListener('click',()=>remove(qi,a.id));
      ul.appendChild(li);
    });
    wrap.innerHTML='';wrap.appendChild(ul);
    syncProg(q);
  }

  function syncProg(q){
    const t=state[q.id].length,d=state[q.id].filter(a=>a.done).length;
    const p=t?Math.round(d/t*100):0;
    const pb=document.getElementById(`pb-${q.id}`);
    const pp=document.getElementById(`pp-${q.id}`);
    const pc=document.getElementById(`pc-${q.id}`);
    if(pb)pb.style.width=`${p}%`;
    if(pp)pp.textContent=`${p}%`;
    if(pc)pc.textContent=`${d}/${t}`;
    renderStatCards();renderAnalytics();renderHeader();
  }

  function renderAnalytics(){
    const totAll=QS.reduce((s,q)=>s+state[q.id].length,0);
    const dnAll=QS.reduce((s,q)=>s+state[q.id].filter(a=>a.done).length,0);
    const pAll=totAll?Math.round(dnAll/totAll*100):0;
    document.getElementById('d-big').textContent=`${pAll}%`;
    const C=2*Math.PI*56;
    let off=0;
    QS.forEach(q=>{
      const d=state[q.id].filter(a=>a.done).length;
      const sl=totAll?(d/totAll)*C:0;
      const arc=document.getElementById(q.arc);
      if(arc){arc.style.strokeDasharray=`${sl} ${C-sl}`;arc.style.strokeDashoffset=-off;off+=sl;}
    });
    document.getElementById('legend').innerHTML=QS.map(q=>{
      const t=state[q.id].length,d=state[q.id].filter(a=>a.done).length;
      const p=t?Math.round(d/t*100):0;
      return`<div class="lg-row">
        <div class="lg-dot"style="background:linear-gradient(135deg,${q.cs},${q.ce})"></div>
        <span class="lg-name">${q.lb} · ${q.mo}</span>
        <span class="lg-cnt">${d}/${t}</span>
        <span class="lg-pct">${p}%</span>
      </div>`;
    }).join('');
    document.getElementById('barchart').innerHTML=QS.map(q=>{
      const t=state[q.id].length,d=state[q.id].filter(a=>a.done).length;
      const p=t?Math.round(d/t*100):0;
      return`<div>
        <div class="bc-meta">
          <span class="bc-lbl">${q.lb} · ${q.mo}</span>
          <span class="bc-stat">${d} / ${t} &nbsp;·&nbsp; ${p}%</span>
        </div>
        <div class="bc-track"><div class="bc-fill"style="width:${p}%;background:linear-gradient(90deg,${q.cs},${q.ce})"></div></div>
      </div>`;
    }).join('');
  }

  async function addTask(qi){
    const q=QS[qi];
    const tmp='tmp-'+Date.now();
    state[q.id].push({id:tmp,text:'',done:false});
    const pnl=document.getElementById(`pnl-${q.id}`);
    renderList(q,pnl);
    setTimeout(()=>{const ins=pnl.querySelectorAll('.t-inp');if(ins.length)ins[ins.length-1].focus();},30);
    const{data,error}=await sb.from('iapb').insert([{activity_title:'',quarter_implementation:q.db,completed:false}]).select().single();
    if(error){state[q.id]=state[q.id].filter(a=>a.id!==tmp);renderList(q,pnl);return;}
    const idx=state[q.id].findIndex(a=>a.id===tmp);
    if(idx!==-1)state[q.id][idx]={id:data.id.toString(),text:data.activity_title||'',done:data.completed};
    renderList(q,pnl);
  }

  async function toggle(qi,id){
    const q=QS[qi];const a=state[q.id].find(x=>x.id===id);
    if(!a)return;a.done=!a.done;
    renderList(q,document.getElementById(`pnl-${q.id}`));
    toast(a.done?'✓ Marked as done':'↩ Marked as pending');
    await sb.from('iapb').update({completed:a.done}).eq('id',id);
  }

  async function saveText(qi,id,text){
    const q=QS[qi];const a=state[q.id].find(x=>x.id===id);
    if(a)a.text=text;
    await sb.from('iapb').update({activity_title:text}).eq('id',id);
  }

  async function remove(qi,id){
    const q=QS[qi];const prev=[...state[q.id]];
    state[q.id]=state[q.id].filter(a=>a.id!==id);
    renderList(q,document.getElementById(`pnl-${q.id}`));
    toast('Activity removed');
    const{error}=await sb.from('iapb').delete().eq('id',id);
    if(error){state[q.id]=prev;renderList(q,document.getElementById(`pnl-${q.id}`));}
  }

  async function runAI(qi){
    const q=QS[qi];
    const btn=document.getElementById(`ai-${q.id}`);
    btn.innerHTML=`<div class="sp"></div>`;btn.disabled=true;
    try{
      const{GoogleGenAI,Type}=await import("https://esm.sh/@google/genai@^1.33.0");
      const ai=new GoogleGenAI({apiKey:GKEY});
      const res=await ai.models.generateContent({
        model:'gemini-2.5-flash',
        contents:`Generate 4 short, specific Navy logistics activity ideas for "${q.title}". Max 7 words each.`,
        config:{responseMimeType:"application/json",responseSchema:{type:Type.ARRAY,items:{type:Type.STRING}}}
      });
      const list=JSON.parse(res.text);
      if(Array.isArray(list)){
        for(const text of list){
          const{data,err}=await sb.from('iapb').insert([{activity_title:text,quarter_implementation:q.db,completed:false}]).select().single();
          if(!err&&data)state[q.id].push({id:data.id.toString(),text:data.activity_title,done:data.completed});
        }
        renderList(q,document.getElementById(`pnl-${q.id}`));
        toast(`✦ Added ${list.length} AI suggestions`);
      }
    }catch(e){console.error(e);toast('Could not generate suggestions');}
    finally{btn.innerHTML=`<div class="ai-glow"></div>${IC.ai}`;btn.disabled=false;}
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function h2r(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

  fetchAll();
</script>
</body>
</html>
