<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNCE Scanned Documents Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --clay-teal: #5de8d0;
      --clay-blue: #6ba8ff;
      --clay-purple: #b39dff;
      --clay-red: #ff8585;
      --clay-green: #5ddcaa;
      --clay-yellow: #ffd166;
      --shadow-clay: 6px 6px 0px rgba(0,0,0,0.07), 0 20px 60px rgba(93,232,208,0.14);
      --shadow-card: 3px 3px 0px rgba(0,0,0,0.05), 0 10px 35px rgba(93,232,208,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #edfffe 0%, #f0f8ff 50%, #f0fff8 100%);
      min-height: 100vh;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #5de8d0, #6ba8ff);
      top: -100px; left: -80px;
    }
    body::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #b39dff, #5ddcaa);
      bottom: -80px; right: -60px;
    }

    .page-wrap {
      max-width: 1050px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header card */
    .clay-header {
      background: linear-gradient(160deg, #fff 0%, #f5fffd 100%);
      border-radius: 28px;
      padding: 26px 32px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.95);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      background: linear-gradient(135deg, var(--clay-teal), var(--clay-blue));
      width: 52px; height: 52px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1.65rem;
      font-weight: 900;
      color: #1a3a38;
      letter-spacing: -0.4px;
    }

    /* Alert */
    .clay-alert {
      border-radius: 16px;
      padding: 13px 18px;
      font-size: 0.875rem;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,0.85);
      margin-bottom: 18px;
      display: none;
    }
    .alert-success { background: linear-gradient(135deg, #edfff8, #d5fff0); color: #0a7a45; }
    .alert-error   { background: linear-gradient(135deg, #fff0f0, #ffe0e0); color: #c02020; }

    /* Main content card */
    .clay-card {
      background: linear-gradient(160deg, #fff 0%, #f5fffd 100%);
      border-radius: 28px;
      padding: 28px 32px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.95);
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 900;
      color: #1a3a38;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      width: 8px; height: 8px;
      background: linear-gradient(135deg, var(--clay-teal), var(--clay-blue));
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Upload area */
    .upload-area {
      background: linear-gradient(135deg, #edfffe, #e8f8ff);
      border-radius: 18px;
      border: 2px dashed #9de8da;
      padding: 16px 20px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-input {
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a3a38;
      flex: 1;
      min-width: 160px;
    }

    .btn-upload {
      background: linear-gradient(135deg, var(--clay-teal), var(--clay-blue));
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 800;
      padding: 10px 24px;
      border-radius: 13px;
      border: none;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 rgba(0,0,0,0.12); }
    .btn-upload:disabled { opacity: 0.6; pointer-events: none; }

    .btn-refresh {
      background: linear-gradient(135deg, #b39dff, #9b7bff);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 800;
      padding: 10px 20px;
      border-radius: 13px;
      border: none;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
      white-space: nowrap;
    }
    .btn-refresh:hover { transform: translateY(-2px); }

    /* Spinner */
    .clay-spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Loading state */
    .loading-state {
      text-align: center;
      padding: 32px;
      color: #6ab8b0;
      font-weight: 700;
      font-size: 0.95rem;
    }

    /* Table */
    .clay-table-wrap {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 2px solid rgba(255,255,255,0.9);
      overflow-x: auto;
      margin-top: 6px;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: linear-gradient(135deg, #1a3a38, #0e2828);
      color: white;
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 14px 16px;
      text-align: left;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1.5px solid #edfff9;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1a3a38;
      background: white;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f5fffd; }

    .thumbnail {
      width: 52px; height: 52px;
      border-radius: 11px;
      object-fit: cover;
      border: 2px solid #c5f0ea;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.06);
    }
    .file-icon { font-size: 28px; display: block; text-align: center; width: 52px; }

    .file-size-text { color: #6ab8b0; font-size: 0.82rem; font-weight: 700; }

    .btn-view {
      display: inline-block;
      background: linear-gradient(135deg, var(--clay-green), #3dbf8a);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-view:hover { transform: translateY(-1px); }

    .btn-remove {
      background: linear-gradient(135deg, var(--clay-red), #e05555);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-left: 6px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-remove:hover { transform: translateY(-1px); }
    .btn-remove:disabled { opacity: 0.5; pointer-events: none; }

    .empty-row td {
      text-align: center;
      padding: 2.5rem;
      color: #6ab8b0;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- Header -->
    <div class="clay-header">
      <div class="header-icon">📄</div>
      <div class="header-title">TNCE Scanned Documents Dashboard</div>
    </div>

    <!-- Alert -->
    <div id="alertBox" class="clay-alert"></div>

    <!-- Main Card -->
    <div class="clay-card">
      <div class="section-title">Upload Documents</div>

      <div class="upload-area">
        <input type="file" id="docInput" class="file-input" multiple accept=".pdf,.jpg,.jpeg,.png">
        <button class="btn-upload" onclick="uploadFiles()">
          <span id="uploadText">⬆ Upload</span>
        </button>
        <button class="btn-refresh" onclick="loadFiles()">🔄 Refresh</button>
      </div>

      <div class="clay-table-wrap">
        <table id="docTable">
          <thead>
            <tr>
              <th>Preview</th>
              <th>Filename</th>
              <th>Size</th>
              <th>Date Uploaded</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="5" class="loading-state">⏳ Loading documents...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://jdzfxfriydakuqegtahq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
    const supabaseTNCE = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const BUCKET_NAME = "tnce-scanned-documents";

    document.addEventListener("DOMContentLoaded", () => loadFiles());

    function showAlert(message, type = 'success') {
      const box = document.getElementById('alertBox');
      box.className = 'clay-alert alert-' + type;
      box.textContent = message;
      box.style.display = 'block';
      setTimeout(() => { box.style.display = 'none'; }, 4000);
    }

    function formatFileSize(bytes) {
      if (!bytes) return '—';
      const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }

    async function uploadFiles() {
      const input = document.getElementById('docInput');
      const files = Array.from(input.files);
      if (!files.length) { showAlert("Please select at least one file!", 'error'); return; }

      const uploadText = document.getElementById('uploadText');
      const uploadBtn = document.querySelector('.btn-upload');
      uploadBtn.disabled = true;
      uploadText.innerHTML = '<span class="clay-spinner"></span> Uploading...';

      try {
        for (const file of files) {
          const ts = Date.now(), rand = Math.random().toString(36).substring(7);
          const ext = file.name.split('.').pop();
          const uniqueName = `${ts}_${rand}.${ext}`;

          const { error: upErr } = await supabaseTNCE.storage.from(BUCKET_NAME).upload(uniqueName, file);
          if (upErr) throw upErr;

          const { data: urlData } = supabaseTNCE.storage.from(BUCKET_NAME).getPublicUrl(uniqueName);

          const { error: dbErr } = await supabaseTNCE.from('tnce_scanned_documents').insert([{
            filename: file.name, file_type: file.type, file_size: file.size, file_path: uniqueName
          }]);
          if (dbErr) throw dbErr;
        }
        showAlert(`✅ ${files.length} file(s) uploaded successfully!`, 'success');
        input.value = '';
        loadFiles();
      } catch (err) {
        showAlert('❌ Error uploading: ' + err.message, 'error');
      } finally {
        uploadBtn.disabled = false;
        uploadText.textContent = '⬆ Upload';
      }
    }

    async function loadFiles() {
      const tbody = document.querySelector('#docTable tbody');
      tbody.innerHTML = '<tr><td colspan="5" class="loading-state">⏳ Loading documents...</td></tr>';
      try {
        const { data: files, error } = await supabaseTNCE.from('tnce_scanned_documents').select('*').order('date_uploaded', { ascending: false });
        if (error) throw error;
        tbody.innerHTML = '';
        if (!files.length) {
          tbody.innerHTML = '<tr class="empty-row"><td colspan="5">📂 No documents found. Upload your first document!</td></tr>';
          return;
        }
        files.forEach(addFileRow);
      } catch (err) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="5" style="color:#c02020;">❌ Error: ${err.message}</td></tr>`;
      }
    }

    function addFileRow(file) {
      const tbody = document.querySelector('#docTable tbody');
      const row = document.createElement('tr');
      row.dataset.id = file.id;
      const { data: urlData } = supabaseTNCE.storage.from(BUCKET_NAME).getPublicUrl(file.file_path);
      const url = urlData.publicUrl;
      let preview = file.file_type?.startsWith('image/')
        ? `<img src="${url}" class="thumbnail" alt="${file.filename}">`
        : file.file_type === 'application/pdf'
        ? `<span class="file-icon">📄</span>`
        : `<span class="file-icon">📎</span>`;
      row.innerHTML = `
        <td>${preview}</td>
        <td>${file.filename}</td>
        <td class="file-size-text">${formatFileSize(file.file_size)}</td>
        <td>${new Date(file.date_uploaded).toLocaleString()}</td>
        <td>
          <a href="${url}" target="_blank" class="btn-view">👁 View</a>
          <button class="btn-remove" onclick="removeFile(${file.id}, '${file.file_path}')">🗑 Remove</button>
        </td>`;
      tbody.appendChild(row);
    }

    async function removeFile(fileId, filePath) {
      if (!confirm('Delete this document?')) return;
      try {
        await supabaseTNCE.storage.from(BUCKET_NAME).remove([filePath]);
        const { error } = await supabaseTNCE.from('tnce_scanned_documents').delete().eq('id', fileId);
        if (error) throw error;
        document.querySelector(`#docTable tr[data-id='${fileId}']`)?.remove();
        showAlert('✅ Document deleted successfully!', 'success');
      } catch (err) {
        showAlert('❌ Error deleting: ' + err.message, 'error');
      }
    }
  </script>
</body>
</html>
