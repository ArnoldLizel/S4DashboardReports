<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Management Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --clay-green: #5ddcaa;
      --clay-blue: #6b9fff;
      --clay-purple: #b39dff;
      --clay-red: #ff8585;
      --clay-yellow: #ffd166;
      --shadow-clay: 6px 6px 0px rgba(0,0,0,0.07), 0 20px 60px rgba(93,220,170,0.13);
      --shadow-card: 3px 3px 0px rgba(0,0,0,0.05), 0 8px 30px rgba(93,220,170,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #edfff7 0%, #f0f8ff 50%, #f5f0ff 100%);
      min-height: 100vh;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 450px; height: 450px;
      background: radial-gradient(circle, #5ddcaa, #6b9fff);
      top: -80px; right: -80px;
    }
    body::after {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #b39dff, #ff8585);
      bottom: -60px; left: -60px;
    }

    .page-wrap {
      max-width: 1050px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .clay-card {
      background: linear-gradient(160deg, #fff 0%, #f8fff9 100%);
      border-radius: 28px;
      padding: 28px 32px;
      box-shadow: var(--shadow-clay);
      border: 2.5px solid rgba(255,255,255,0.95);
      margin-bottom: 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 0;
    }

    .header-title {
      font-size: 1.65rem;
      font-weight: 900;
      color: #1a3a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      background: linear-gradient(135deg, var(--clay-green), var(--clay-blue));
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      font-size: 22px;
    }

    .btn-test {
      background: linear-gradient(135deg, #ffd166, #ffb347);
      color: #7a4a00;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      padding: 10px 20px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.8);
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-test:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 rgba(0,0,0,0.13); }

    #statusMessage {
      display: none;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 0.875rem;
      font-weight: 700;
      border: 2px solid rgba(255,255,255,0.8);
      margin-bottom: 16px;
    }
    .error { background: linear-gradient(135deg, #fff0f0, #ffe0e0); color: #c02020; }
    .success { background: linear-gradient(135deg, #f0fff6, #dffff0); color: #0a7a45; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 900;
      color: #1a3a2a;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 8px; height: 8px;
      background: linear-gradient(135deg, var(--clay-green), var(--clay-blue));
      border-radius: 50%;
    }

    .upload-area {
      background: linear-gradient(135deg, #f0fff8, #eef8ff);
      border-radius: 18px;
      border: 2px dashed #a0d8c0;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-input {
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #2a6050;
    }

    .btn-upload {
      background: linear-gradient(135deg, #6b9fff, #5ddcaa);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      padding: 10px 22px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-upload:hover { transform: translateY(-2px); }
    .btn-upload.loading { opacity: 0.6; pointer-events: none; }

    /* Table */
    .clay-table-wrap {
      overflow-x: auto;
      border-radius: 18px;
      box-shadow: var(--shadow-card);
      border: 2px solid rgba(255,255,255,0.9);
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: linear-gradient(135deg, #1a3a2a, #2a5040);
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 14px 16px;
      text-align: left;
    }
    th:first-child { border-radius: 14px 0 0 0; }
    th:last-child { border-radius: 0 14px 0 0; }

    td {
      padding: 13px 16px;
      border-bottom: 1.5px solid #edfff5;
      font-size: 0.875rem;
      font-weight: 600;
      color: #2a4038;
      background: white;
    }

    tr:last-child td { border-bottom: none; }
    tr:last-child td:first-child { border-radius: 0 0 0 14px; }
    tr:last-child td:last-child { border-radius: 0 0 14px 0; }
    tr:hover td { background: #f5fffb; }

    .btn-download {
      display: inline-block;
      background: linear-gradient(135deg, #5ddcaa, #3dbf8a);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 7px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-download:hover { transform: translateY(-1px); }

    .btn-remove {
      background: linear-gradient(135deg, #ff8585, #e05555);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 7px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-left: 6px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: transform 0.15s;
    }
    .btn-remove:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="page-wrap">
    <!-- Header -->
    <div class="clay-card">
      <div class="page-header">
        <div class="header-title">
          <div class="header-icon">📁</div>
          File Management Dashboard
        </div>
        <button class="btn-test" onclick="testConnection()">🔧 Test Connection</button>
      </div>
    </div>

    <div id="statusMessage"></div>

    <!-- Transmittal -->
    <div class="clay-card">
      <div class="section-title">Transmittal Files</div>
      <div class="upload-area">
        <input type="file" id="transmittalInput" class="file-input">
        <button class="btn-upload" onclick="uploadFile('transmittal')">⬆ Upload</button>
      </div>
      <div class="clay-table-wrap">
        <table id="transmittalTable">
          <thead>
            <tr>
              <th>Filename</th>
              <th>Date Uploaded</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Disposition -->
    <div class="clay-card">
      <div class="section-title">Disposition Form Files</div>
      <div class="upload-area">
        <input type="file" id="dispositionInput" class="file-input">
        <button class="btn-upload" onclick="uploadFile('disposition')">⬆ Upload</button>
      </div>
      <div class="clay-table-wrap">
        <table id="dispositionTable">
          <thead>
            <tr>
              <th>Filename</th>
              <th>Date Uploaded</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const SUPABASE_URL = "https://jdzfxfriydakuqegtahq.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      window.showMessage = function(message, type) {
        const div = document.getElementById('statusMessage');
        div.className = type;
        div.textContent = message;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 5000);
      };

      window.testConnection = async function() {
        showMessage('Testing connection...', 'success');
        try {
          const result = await db.from('files').select('count', { count: 'exact', head: true });
          if (result.error) throw result.error;
          const bucketResult = await db.storage.listBuckets();
          const exists = bucketResult.data && bucketResult.data.some(b => b.name === 'file-management');
          if (!exists) showMessage('⚠️ Bucket "file-management" not found. Please create it.', 'error');
          else showMessage('✅ Connection successful! Database and storage ready.', 'success');
        } catch (err) { showMessage('❌ Connection failed: ' + err.message, 'error'); }
      };

      window.uploadFile = async function(type) {
        const input = document.getElementById(type + 'Input');
        const file = input.files[0];
        if (!file) { showMessage("Please select a file to upload!", 'error'); return; }
        const uploadBtn = event.target;
        try {
          uploadBtn.classList.add('loading');
          uploadBtn.textContent = 'Uploading...';
          const timestamp = Date.now();
          const filePath = type + '/' + timestamp + '_' + file.name;
          const uploadResult = await db.storage.from('file-management').upload(filePath, file);
          if (uploadResult.error) throw uploadResult.error;
          const urlData = db.storage.from('file-management').getPublicUrl(filePath);
          const insertResult = await db.from('files').insert([{ filename: file.name, file_type: type, file_path: filePath, file_size: file.size, mime_type: file.type }]).select().single();
          if (insertResult.error) throw insertResult.error;
          addFileRow(type, { id: insertResult.data.id, name: insertResult.data.filename, date: new Date(insertResult.data.uploaded_at).toLocaleString(), url: urlData.data.publicUrl, path: insertResult.data.file_path });
          input.value = '';
          showMessage('✅ File uploaded successfully!', 'success');
        } catch (err) { showMessage('❌ Upload failed: ' + err.message, 'error'); }
        finally { uploadBtn.classList.remove('loading'); uploadBtn.textContent = '⬆ Upload'; }
      };

      window.addFileRow = function(type, file) {
        const tbody = document.querySelector('#' + type + 'Table tbody');
        const row = document.createElement('tr');
        row.dataset.id = file.id;
        row.innerHTML = `<td>${file.name}</td><td>${file.date}</td><td><a href="${file.url}" download="${file.name}" class="btn-download" target="_blank">⬇ Download</a><button class="btn-remove" onclick="removeFile('${type}', ${file.id}, '${file.path}')">🗑 Remove</button></td>`;
        tbody.appendChild(row);
      };

      window.loadFiles = async function(type) {
        try {
          const result = await db.from('files').select('*').eq('file_type', type).order('uploaded_at', { ascending: false });
          if (result.error) throw result.error;
          (result.data || []).forEach(file => {
            const urlData = db.storage.from('file-management').getPublicUrl(file.file_path);
            addFileRow(type, { id: file.id, name: file.filename, date: new Date(file.uploaded_at).toLocaleString(), url: urlData.data.publicUrl, path: file.file_path });
          });
        } catch (err) { showMessage('❌ Failed to load ' + type + ' files: ' + err.message, 'error'); }
      };

      window.removeFile = async function(type, fileId, filePath) {
        if (!confirm('Are you sure you want to delete this file?')) return;
        try {
          await db.storage.from('file-management').remove([filePath]);
          const dbResult = await db.from('files').delete().eq('id', fileId);
          if (dbResult.error) throw dbResult.error;
          const row = document.querySelector('#' + type + 'Table tr[data-id="' + fileId + '"]');
          if (row) row.remove();
          showMessage('✅ File deleted successfully!', 'success');
        } catch (err) { showMessage('❌ Failed to delete file: ' + err.message, 'error'); }
      };

      document.addEventListener('DOMContentLoaded', async function() {
        await testConnection();
        await loadFiles('transmittal');
        await loadFiles('disposition');
      });
    })();
  </script>
</body>
</html>
