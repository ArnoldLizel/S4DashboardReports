    /* ── BG layers ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(180,30,10,.35) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 15% 50%, rgba(120,20,0,.2) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 85% 30%, rgba(100,10,0,.18) 0%, transparent 55%),
        linear-gradient(180deg, rgba(10,6,8,.55) 0%, rgba(22,10,12,.5) 40%, rgba(28,13,15,.5) 100%);
      z-index: 0;
      pointer-events: none;
    }

    /* Ember particles */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 15% 20%, rgba(255,100,30,.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 15%, rgba(255,160,50,.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 65%, rgba(200,60,20,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 70%, rgba(255,120,40,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 40%, rgba(255,80,20,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 80%, rgba(220,80,20,.5) 0%, transparent 100%),
        radial-gradient(2px 2px at 90% 50%, rgba(255,140,40,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 85%, rgba(200,60,10,.5) 0%, transparent 100%);
      z-index: 0;
      pointer-events: none;
      animation: floatEmbers 12s ease-in-out infinite alternate;
    }

    @keyframes floatEmbers {
      0%   { transform: translateY(0) scale(1); opacity: .7; }
      100% { transform: translateY(-18px) scale(1.05); opacity: 1; }
    }

    /* All content above bg */
    nav, .filter-bar, .container { position: relative; z-index: 1; }

    /* ══════════════════════════════════
       NAV
    ══════════════════════════════════ */
    .nav-header {
      background: linear-gradient(180deg, #1e0c10 0%, #150810 100%);
      border-bottom: 1px solid var(--border);
      padding: .9rem 2.5rem;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 0 40px rgba(180,30,10,.4), 0 4px 0 rgba(200,50,20,.2);
    }

    /* Top accent line */
    .nav-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--gold) 50%, var(--red) 70%, transparent 100%);
    }

    .brand-box { display: flex; align-items: center; gap: 14px; }

    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--red) 0%, #6b0a05 100%);
      border: 1px solid rgba(255,80,40,.4);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold-lt); font-size: .9rem;
      box-shadow: 0 0 20px rgba(255,60,20,.5);
      animation: pulseIcon 3s ease-in-out infinite;
    }
    @keyframes pulseIcon {
      0%, 100% { box-shadow: 0 0 20px rgba(255,60,20,.5); }
      50%       { box-shadow: 0 0 35px rgba(255,100,30,.8), 0 0 60px rgba(255,60,10,.3); }
    }

    .brand-title {
      font-family: 'Cinzel', serif;
      font-weight: 900; font-size: 1.1rem; letter-spacing: .12em;
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 50%, var(--gold-dim) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 0 8px rgba(212,160,23,.5));
    }

    .brand-sub {
      font-family: 'Orbitron', monospace;
      font-size: .55rem; font-weight: 700; letter-spacing: .25em;
      color: var(--red-hot); text-transform: uppercase; margin-top: 2px;
    }

    .nav-btn {
      padding: .55rem 1.3rem;
      font-family: 'Cinzel', serif; font-weight: 700; font-size: .75rem;
      letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      transition: all .2s ease; border: none; clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .nav-btn:hover  { transform: translateY(-2px); }
    .nav-btn:active { transform: translateY(1px); }

    .nav-btn-outline {
      background: rgba(200,50,20,.15);
      color: var(--text2);
      border: 1px solid var(--border);
      box-shadow: 0 0 12px rgba(200,50,20,.15), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .nav-btn-outline:hover { background: rgba(200,50,20,.28); color: var(--text); border-color: var(--red); box-shadow: 0 0 20px rgba(200,50,20,.3); }

    .nav-btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, #a07010 100%);
      color: #1a0a02;
      box-shadow: 0 0 20px rgba(212,160,23,.4), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .nav-btn-primary:hover { box-shadow: 0 0 32px rgba(212,160,23,.7), 0 0 60px rgba(212,160,23,.3); background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 100%); }

    /* ══════════════════════════════════
       FILTER BAR
    ══════════════════════════════════ */
    .filter-bar {
      background: linear-gradient(180deg, #160a0d 0%, #110709 100%);
      border-bottom: 1px solid var(--border);
      padding: .75rem 2.5rem;
      display: flex; gap: 10px; align-items: center;
      position: sticky; top: 61px; z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
    }

    .filter-label {
      font-family: 'Orbitron', monospace;
      font-size: .58rem; font-weight: 700; letter-spacing: .2em;
      color: var(--muted); text-transform: uppercase; margin-right: 8px;
    }

    .btn-filter {
      padding: .5rem 1.15rem;
      font-family: 'Cinzel', serif; font-weight: 600; font-size: .72rem; letter-spacing: .08em;
      cursor: pointer;
      background: rgba(40,10,12,.6);
      color: var(--text2);
      border: 1px solid rgba(200,50,20,.2);
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      transition: all .2s ease;
    }
    .btn-filter:hover  { color: var(--text); border-color: var(--red); background: rgba(180,40,20,.25); box-shadow: 0 0 14px rgba(200,50,20,.25); }
    .btn-filter:active { transform: scale(.97); }

    .btn-filter.active {
      background: linear-gradient(135deg, rgba(180,30,10,.7) 0%, rgba(100,10,5,.8) 100%);
      color: var(--gold-lt);
      border-color: var(--red-hot);
      box-shadow: 0 0 18px rgba(255,50,20,.4), inset 0 1px 0 rgba(255,120,60,.2);
    }

    /* Quarter-specific accent colors */
    .btn-filter[data-filter="First Quarter"].active  { border-color: #5b8aff; color: #a0c0ff; box-shadow: 0 0 18px rgba(80,120,255,.4); background: linear-gradient(135deg, rgba(40,70,200,.5),rgba(20,40,120,.7));}
    .btn-filter[data-filter="Second Quarter"].active { border-color: #2ecc71; color: #80ffb0; box-shadow: 0 0 18px rgba(40,200,100,.4); background: linear-gradient(135deg, rgba(20,160,70,.5),rgba(10,100,40,.7));}
    .btn-filter[data-filter="Third Quarter"].active  { border-color: var(--gold); color: var(--gold-lt); box-shadow: 0 0 18px rgba(212,160,23,.4); background: linear-gradient(135deg, rgba(160,110,10,.5),rgba(100,70,5,.7));}
    .btn-filter[data-filter="Fourth Quarter"].active { border-color: var(--red-hot); color: #ffa090; box-shadow: 0 0 18px rgba(255,60,30,.4); background: linear-gradient(135deg, rgba(180,30,10,.6),rgba(100,10,5,.8));}

    /* ══════════════════════════════════
       CONTAINER & CARD
    ══════════════════════════════════ */
    .container { max-width: 99%; margin: 1.5rem auto; padding: 0 1.25rem; }

    .data-card {
      background: linear-gradient(160deg, #1c0d12 0%, #14090d 100%);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(200,80,40,.4);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.6),
        0 30px 80px rgba(0,0,0,.8),
        0 0 60px rgba(180,30,10,.12),
        inset 0 1px 0 rgba(255,100,50,.08);
      animation: slideIn .5s cubic-bezier(.2,1,.3,1) both;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    /* Corner ornaments */
    .data-card { position: relative; overflow: hidden; }
    .data-card::before, .data-card::after {
      content: ''; position: absolute;
      width: 40px; height: 40px;
      border-color: var(--gold-dim); border-style: solid;
      pointer-events: none; z-index: 2; opacity: .7;
    }
    .data-card::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .data-card::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    /* ══════════════════════════════════
       TOOLBAR
    ══════════════════════════════════ */
    .table-toolbar {
      padding: 1.1rem 1.6rem;
      background: rgba(10,5,7,.5);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
    }

    .search-input {
      width: 380px; padding: 10px 18px;
      background: rgba(5,2,3,.6);
      border: 1px solid rgba(200,50,20,.25);
      font-family: 'Rajdhani', sans-serif; font-size: .92rem; font-weight: 600;
      color: var(--text); outline: none;
      transition: all .2s;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
    }
    .search-input:focus { border-color: var(--red-hot); box-shadow: 0 0 20px rgba(255,50,20,.2); background: rgba(30,8,10,.8); }
    .search-input::placeholder { color: var(--muted); }

    .record-count {
      font-family: 'Orbitron', monospace; font-weight: 700; font-size: .7rem; letter-spacing: .15em;
      color: var(--gold); padding: 8px 18px;
      background: rgba(212,160,23,.08);
      border: 1px solid var(--border-gold);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    .tbtn {
      padding: .55rem 1.15rem;
      font-family: 'Cinzel', serif; font-weight: 700; font-size: .75rem; letter-spacing: .08em;
      cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
      transition: all .2s ease; border: none;
      clip-path: polygon(7px 0%, 100% 0%, calc(100% - 7px) 100%, 0% 100%);
    }
    .tbtn:hover  { transform: translateY(-2px); }
    .tbtn:active { transform: scale(.97); }

    .tbtn-outline {
      background: rgba(200,50,20,.12);
      color: var(--text2); border: 1px solid var(--border);
    }
    .tbtn-outline:hover { background: rgba(200,50,20,.25); color: var(--text); border-color: var(--red); box-shadow: 0 0 16px rgba(200,50,20,.25); }

    /* ══════════════════════════════════
       TABLE
    ══════════════════════════════════ */
    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: linear-gradient(180deg, #2a0f14 0%, #200a0f 100%);
      color: var(--gold);
      font-family: 'Cinzel', serif; font-weight: 700;
      font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; text-align: left;
      padding: .9rem .875rem;
      border-bottom: 1px solid rgba(212,160,23,.3);
      border-right: 1px solid rgba(200,50,20,.1);
    }
    thead th:last-child { border-right: none; }

    .col-ref     { width: 54px; text-align: center; }
    .col-act     { width: 20%; }
    .col-sub     { width: 18%; }
    .col-time    { width: 260px; }
    .col-qtr     { width: 190px; }
    .col-remarks { min-width: 420px; }
    .col-del     { width: 64px; text-align: center; }

    td {
      padding: .8rem .875rem;
      border-bottom: 1px solid rgba(200,50,20,.08);
      border-right: 1px solid rgba(200,50,20,.05);
      vertical-align: top; color: var(--text);
    }
    td:last-child { border-right: none; }

    tbody tr { transition: background .15s; }
    tbody tr:hover { background: rgba(180,30,10,.08); }
    tbody tr:last-child td { border-bottom: none; }
    td.col-ref {
      font-family: 'Orbitron', monospace; font-weight: 700; font-size: .7rem;
      color: var(--red-hot); text-align: center; letter-spacing: .1em;
    }

    /* Inputs */
    textarea, select {
      width: 100%; border: 1px solid rgba(200,50,20,.15);
      padding: 9px 11px;
      font-family: 'Rajdhani', sans-serif; font-size: .9rem; font-weight: 600;
      background: rgba(5,2,3,.5);
      color: var(--text); transition: .2s; resize: none; overflow: hidden;
    }
    textarea:focus, select:focus {
      background: rgba(30,8,10,.8);
      border-color: var(--red-hot); outline: none;
      box-shadow: 0 0 16px rgba(255,50,20,.18);
    }
    select option { background: #1a0a0d; color: var(--text); }

    /* Month grid */
    .month-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; }
    .month-item {
      font-family: 'Orbitron', monospace;
      font-size: .62rem; padding: 6px 3px; text-align: center; font-weight: 700; letter-spacing: .06em;
      cursor: pointer;
      background: rgba(5,2,3,.5);
      border: 1px solid rgba(200,50,20,.15);
      color: var(--muted);
      transition: all .18s ease;
      user-select: none;
    }
    .month-item:hover { border-color: var(--red-hot); color: var(--text); background: rgba(180,30,10,.2); }
    .month-item.active {
      background: linear-gradient(135deg, rgba(180,30,10,.7), rgba(100,10,5,.8));
      color: var(--gold-lt);
      border-color: var(--red-hot);
      box-shadow: 0 0 10px rgba(255,50,20,.3);
    }

    /* Delete button */
    .btn-del {
      background: rgba(180,30,10,.15);
      color: var(--red);
      border: 1px solid rgba(200,50,20,.3);
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: .8rem;
      transition: all .2s ease;
    }
    .btn-del:hover {
      background: rgba(200,40,20,.4);
      color: #ff8070;
      border-color: var(--red-hot);
      box-shadow: 0 0 16px rgba(200,40,20,.4);
      transform: scale(1.1);
    }
    .btn-del:active { transform: scale(.95); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: rgba(200,50,20,.4); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(200,50,20,.7); }

    /* Divider ornament under brand */
    .brand-divider {
      display: flex; flex-direction: column; gap: 2px;
    }

    /* Spinning rune on brand */
    .rune {
      font-size: .65rem; color: var(--red); opacity: .6;
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print {
      .nav-header, .filter-bar, .tbtn, .nav-btn, .btn-del, .table-toolbar { display: none !important; }
      body::before, body::after { display: none; }
      body { background: #fff; color: #000; }
      .data-card { border: 1px solid #ccc; }
    }

    /* Loading shimmer */
    .loading-row td { animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer { 0%, 100% { opacity: .3; } 50% { opacity: .7; } }
  </style>
</head>
<body>

<!-- ═══════════════ NAV ═══════════════ -->
<nav class="nav-header">
  <div class="brand-box">
    <div class="brand-icon"><i class="fas fa-dragon"></i></div>
    <div class="brand-divider">
      <div class="brand-title">MonitorPro Enterprise</div>
      <div class="brand-sub">⬡ Quarterly Tracker ⬡</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <button id="printBtn"  class="nav-btn nav-btn-outline"><i class="fas fa-file-pdf"></i> Export PDF</button>
    <button id="updateBtn" class="nav-btn nav-btn-primary"><i class="fas fa-save"></i> Save Changes</button>
  </div>
</nav>

<!-- ═══════════════ FILTER ═══════════════ -->
<div class="filter-bar">
  <span class="filter-label">⬡ View</span>
  <button class="btn-filter active" data-filter="All">All Activities</button>
  <button class="btn-filter" data-filter="First Quarter">I · Quarter</button>
  <button class="btn-filter" data-filter="Second Quarter">II · Quarter</button>
  <button class="btn-filter" data-filter="Third Quarter">III · Quarter</button>
  <button class="btn-filter" data-filter="Fourth Quarter">IV · Quarter</button>
</div>

<!-- ═══════════════ MAIN ═══════════════ -->
<div class="container">
  <div class="data-card">
    <div class="table-toolbar">
      <input type="text" id="searchInput" class="search-input" placeholder="⬡  Search activities, remarks…">
      <div style="display:flex;gap:10px;align-items:center;">
        <div id="recordCount" class="record-count">0 ACTIVITIES</div>
        <button id="addRowBtn" class="tbtn tbtn-outline"><i class="fas fa-plus"></i> Add Row</button>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table id="mainTable">
        <thead>
          <tr>
            <th class="col-ref">Ref</th>
            <th class="col-act">Activity</th>
            <th class="col-sub">Sub-Activity</th>
            <th class="col-time">Timeline</th>
            <th class="col-qtr">Quarter</th>
            <th class="col-remarks">Remarks &amp; Updates</th>
            <th class="col-del">Del</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══════════════ SCRIPT ═══════════════ -->
<script>
  const SUPABASE_URL = "https://jdzfxfriydakuqegtahq.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const tableBody = document.getElementById("tableBody");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let activityData = [], currentFilter = "All", searchTerm = "";

  async function fetchData() {
    const { data } = await supabaseClient.from("iapb").select("*").order("id", { ascending: true });
    activityData = data || [];
    filterAndRefresh();
  }

  function filterAndRefresh() {
    let filtered = activityData;
    if (currentFilter !== "All") filtered = filtered.filter(i => i.quarter_implementation === currentFilter);
    if (searchTerm) {
      const term = searchTerm.toLowerCase();
      filtered = filtered.filter(i =>
        (i.activity_title||"").toLowerCase().includes(term) ||
        (i.remarks||"").toLowerCase().includes(term) ||
        (i.sub_activity_title||"").toLowerCase().includes(term)
      );
    }
    refreshView(filtered);
  }

  function refreshView(data) {
    tableBody.innerHTML = "";
    data.forEach((item, index) => {
      const selectedMonths = (item.date_of_implementation || "").split(", ");
      const monthsHtml = months.map(m =>
        `<label class="month-item ${selectedMonths.includes(m) ? 'active' : ''}">
          <input type="checkbox" value="${m}" ${selectedMonths.includes(m) ? "checked" : ""} style="display:none;">${m}
        </label>`
      ).join("");
      const row = document.createElement("tr");
      row.dataset.id = item.id || "";
      row.innerHTML = `
        <td class="col-ref"><b>${String(index + 1).padStart(2,'0')}</b></td>
        <td class="col-act"><textarea oninput="autoResize(this)">${item.activity_title || ""}</textarea></td>
        <td class="col-sub"><textarea oninput="autoResize(this)">${item.sub_activity_title || ""}</textarea></td>
        <td class="col-time"><div class="month-grid">${monthsHtml}</div></td>
        <td class="col-qtr">
          <select class="qtr-select">
            <option value="">Select Quarter</option>
            <option ${item.quarter_implementation === "First Quarter"  ? "selected" : ""}>First Quarter</option>
            <option ${item.quarter_implementation === "Second Quarter" ? "selected" : ""}>Second Quarter</option>
            <option ${item.quarter_implementation === "Third Quarter"  ? "selected" : ""}>Third Quarter</option>
            <option ${item.quarter_implementation === "Fourth Quarter" ? "selected" : ""}>Fourth Quarter</option>
          </select>
        </td>
        <td class="col-remarks"><textarea oninput="autoResize(this)">${item.remarks || ""}</textarea></td>
        <td class="col-del"><button class="btn-del"><i class="fas fa-trash-alt"></i></button></td>`;
      tableBody.appendChild(row);
      row.querySelectorAll('textarea').forEach(autoResize);
    });
    document.getElementById("recordCount").innerText = `${data.length} ACTIVITIES`;
  }

  tableBody.addEventListener('click', async e => {
    const delBtn = e.target.closest('.btn-del');
    if (!delBtn) return;
    const row = delBtn.closest('tr');
    const rowId = row.dataset.id;
    if (!confirm("Delete this activity from the ledger?")) return;
    if (rowId) {
      const { error } = await supabaseClient.from("iapb").delete().eq("id", rowId);
      if (error) { alert("Error: " + error.message); return; }
      activityData = activityData.filter(i => i.id != rowId);
    } else {
      const idx = Array.from(tableBody.children).indexOf(row);
      activityData.splice(idx, 1);
    }
    filterAndRefresh();
  });

  document.querySelectorAll('.btn-filter').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      filterAndRefresh();
    };
  });

  document.getElementById("searchInput").oninput = e => { searchTerm = e.target.value; filterAndRefresh(); };
  function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

  document.getElementById("updateBtn").onclick = async () => {
    const btn = document.getElementById("updateBtn");
    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Saving…"; btn.disabled = true;
    const rows = tableBody.querySelectorAll("tr");
    for (let r of rows) {
      const payload = {
        activity_title: r.querySelector(".col-act textarea").value,
        sub_activity_title: r.querySelector(".col-sub textarea").value,
        date_of_implementation: Array.from(r.querySelectorAll('input:checked')).map(i => i.value).join(", "),
        quarter_implementation: r.querySelector(".qtr-select").value,
        remarks: r.querySelector(".col-remarks textarea").value
      };
      if (r.dataset.id) await supabaseClient.from("iapb").update(payload).eq("id", r.dataset.id);
      else if (payload.activity_title) await supabaseClient.from("iapb").insert([payload]);
    }
    await fetchData();
    btn.innerHTML = "<i class='fas fa-save'></i> Save Changes"; btn.disabled = false;
    alert("⬡ Ledger synchronized successfully!");
  };

  document.getElementById("addRowBtn").onclick = () => {
    activityData.push({ activity_title: "", remarks: "", quarter_implementation: currentFilter !== "All" ? currentFilter : "" });
    filterAndRefresh();
  };

  tableBody.addEventListener('change', e => {
    if (e.target.type === 'checkbox') e.target.parentElement.classList.toggle('active', e.target.checked);
  });

  document.getElementById("printBtn").onclick = () => window.print();
  fetchData();
</script>
</body>
</html>
