<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSG Monitoring | Clay Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:      #dde8f8;
      --c1:      #5b7fff; --c1b: #3a5dd4; --c1sh: rgba(91,127,255,.35);
      --c2:      #34c97e; --c2b: #1fa85e; --c2sh: rgba(52,201,126,.35);
      --c3:      #ff9f43; --c3b: #d97f20; --c3sh: rgba(255,159,67,.35);
      --c4:      #f0506e; --c4b: #c82d4a; --c4sh: rgba(240,80,110,.35);
      --text:    #1e2340; --text2: #5a5f82; --muted: #9098c0;
      --white:   #ffffff; --surface: #f0f4ff;
      --r-xl:26px; --r-lg:18px; --r-md:12px; --r-pill:50px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Nunito',sans-serif;min-height:100vh;
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 15%,rgba(91,127,255,.16) 0%,transparent 50%),
        radial-gradient(ellipse at 90% 85%,rgba(52,201,126,.12) 0%,transparent 50%),
        radial-gradient(ellipse at 75% 10%,rgba(255,159,67,.09) 0%,transparent 40%);
      padding:28px 24px 60px;
      color:var(--text);
    }

    /* ── Wrapper ── */
    .main-wrapper{
      max-width:1750px;margin:0 auto;
      background:var(--white);border-radius:var(--r-xl);
      border:3px solid rgba(255,255,255,.95);
      box-shadow:0 12px 0 0 rgba(91,127,255,.14),0 22px 56px rgba(91,127,255,.12),inset 0 2px 8px rgba(255,255,255,1);
      padding:2.5rem;
      animation:popIn .55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* ── Page header ── */
    .page-header{margin-bottom:2rem;}
    .page-header h1{
      font-family:'Sora',sans-serif;font-size:1.9rem;font-weight:800;
      letter-spacing:-.03em;color:var(--text);
    }
    .page-header p{font-size:.88rem;font-weight:600;color:var(--text2);margin-top:5px;}

    /* ── Summary cards ── */
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:2rem;}
    .summary-card{
      padding:22px 20px;border-radius:var(--r-xl);
      color:#fff;position:relative;overflow:hidden;
      border:3px solid rgba(255,255,255,.5);
      transition:all .28s cubic-bezier(0.34,1.56,0.64,1);
      animation:popIn .5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .summary-card:hover{transform:translateY(-6px) scale(1.02);}
    .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:55%;background:linear-gradient(180deg,rgba(255,255,255,.28),transparent);border-radius:var(--r-xl) var(--r-xl) 60% 60%/var(--r-xl) var(--r-xl) 30px 30px;pointer-events:none;}
    .summary-card::after{content:'';position:absolute;bottom:-24px;right:-24px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.12);pointer-events:none;}
    .card-total{background:linear-gradient(145deg,#6b90ff,#4a6de8);box-shadow:0 10px 0 0 var(--c1b),0 16px 36px var(--c1sh);animation-delay:.04s;}
    .card-svp  {background:linear-gradient(145deg,#44d98e,#24b96e);box-shadow:0 10px 0 0 var(--c2b),0 16px 36px var(--c2sh);animation-delay:.09s;}
    .card-shop {background:linear-gradient(145deg,#ffb55a,#f09030);box-shadow:0 10px 0 0 var(--c3b),0 16px 36px var(--c3sh);animation-delay:.14s;}
    .card-nego {background:linear-gradient(145deg,#ff7088,#e84060);box-shadow:0 10px 0 0 var(--c4b),0 16px 36px var(--c4sh);animation-delay:.19s;}
    .card-total:hover{box-shadow:0 16px 0 0 var(--c1b),0 26px 50px var(--c1sh);}
    .card-svp:hover  {box-shadow:0 16px 0 0 var(--c2b),0 26px 50px var(--c2sh);}
    .card-shop:hover {box-shadow:0 16px 0 0 var(--c3b),0 26px 50px var(--c3sh);}
    .card-nego:hover {box-shadow:0 16px 0 0 var(--c4b),0 26px 50px var(--c4sh);}
    .summary-card h3{font-size:.70rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.85;position:relative;z-index:1;}
    .summary-card .amount{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;margin-top:6px;position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,.15);}

    /* ── Action bar ── */
    .action-bar{
      background:linear-gradient(145deg,var(--surface),#eef2ff);
      border:2px solid rgba(255,255,255,.9);border-radius:var(--r-lg);
      padding:16px 18px;display:flex;justify-content:space-between;align-items:center;
      gap:16px;margin-bottom:1.5rem;
      box-shadow:0 6px 0 0 rgba(91,127,255,.12),0 10px 24px rgba(91,127,255,.09),inset 0 2px 5px rgba(255,255,255,.9);
    }
    .search-bar{
      flex-grow:1;max-width:380px;padding:12px 18px;
      border-radius:var(--r-pill);border:2px solid rgba(91,127,255,.18);
      background:var(--white);color:var(--text);font-family:'Nunito',sans-serif;
      font-size:.92rem;font-weight:600;outline:none;
      box-shadow:inset 0 2px 5px rgba(91,127,255,.07),0 3px 0 0 rgba(91,127,255,.10);
      transition:all .2s;
    }
    .search-bar:focus{border-color:var(--c1);box-shadow:0 0 0 4px rgba(91,127,255,.12),inset 0 2px 5px rgba(91,127,255,.05),0 4px 0 0 rgba(91,127,255,.12);transform:translateY(-1px);}
    .btn-group{display:flex;gap:10px;}

    /* Buttons */
    .btn{
      padding:.7rem 1.2rem;border-radius:var(--r-pill);font-weight:800;font-size:.82rem;
      cursor:pointer;display:inline-flex;align-items:center;gap:7px;border:none;
      font-family:'Nunito',sans-serif;letter-spacing:.03em;
      transition:all .22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn:hover{transform:translateY(-3px) scale(1.04);}
    .btn:active{transform:translateY(2px) scale(.97);}
    .btn-primary{
      background:linear-gradient(145deg,#6b90ff,var(--c1b));color:white;
      box-shadow:0 5px 0 0 rgba(58,93,212,.45),0 8px 20px rgba(91,127,255,.28),inset 0 2px 5px rgba(255,255,255,.25);
    }
    .btn-primary:hover{box-shadow:0 9px 0 0 rgba(58,93,212,.45),0 14px 30px rgba(91,127,255,.32),inset 0 2px 5px rgba(255,255,255,.28);}
    .btn-outline{
      background:linear-gradient(145deg,var(--white),var(--surface));color:var(--text);
      border:2px solid rgba(91,127,255,.18);
      box-shadow:0 5px 0 0 rgba(91,127,255,.12),0 8px 18px rgba(91,127,255,.09),inset 0 1px 4px rgba(255,255,255,.9);
    }
    .btn-outline:hover{border-color:rgba(91,127,255,.35);box-shadow:0 9px 0 0 rgba(91,127,255,.12),0 14px 26px rgba(91,127,255,.12);}
    .btn-danger{
      color:var(--c4);background:linear-gradient(145deg,#fff5f7,#ffe8ee);
      width:36px;height:36px;justify-content:center;border-radius:50%;
      border:2px solid rgba(240,80,110,.2);
      box-shadow:0 3px 0 0 rgba(200,45,74,.15),0 5px 12px rgba(200,45,74,.10),inset 0 1px 3px rgba(255,255,255,.9);
      padding:0;
    }
    .btn-danger:hover{background:linear-gradient(145deg,#ffe0e8,#ffd0da);box-shadow:0 6px 0 0 rgba(200,45,74,.2),0 10px 20px rgba(200,45,74,.15);}

    /* ── Table container ── */
    .table-container{
      border-radius:var(--r-lg);overflow:hidden;
      background:var(--white);
      border:2px solid rgba(91,127,255,.12);
      box-shadow:0 8px 0 0 rgba(91,127,255,.10),0 14px 36px rgba(91,127,255,.08);
    }
    table{width:100%;border-collapse:collapse;table-layout:auto;min-width:1200px;}

    thead th{
      background:linear-gradient(145deg,#6b90ff,var(--c1b));
      padding:1rem .875rem;font-size:.72rem;font-weight:800;
      text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.9);
      border-bottom:none;text-align:left;
    }
    thead th:first-child{border-radius:var(--r-md) 0 0 0;}
    thead th:last-child{border-radius:0 var(--r-md) 0 0;}

    .col-id{width:50px;text-align:center;}
    .col-date{width:160px;} .col-mode{width:220px;} .col-money{width:150px;}
    .col-action{width:60px;text-align:center;} .col-desc{min-width:350px;} .col-remarks{min-width:300px;}

    td{
      padding:1.1rem .875rem;border-bottom:1px solid rgba(91,127,255,.07);
      vertical-align:top;font-size:.92rem;font-weight:600;line-height:1.5;
      word-wrap:break-word;white-space:normal;color:var(--text);
    }
    tbody tr{transition:background .15s;}
    tbody tr:hover{background:rgba(91,127,255,.04);}
    tbody tr:last-child td{border-bottom:none;}

    td[contenteditable="true"]{
      background:linear-gradient(145deg,var(--surface),#eef2ff);
      border:2px solid transparent;border-radius:var(--r-md);padding:9px 12px;min-height:42px;
      transition:.2s;
    }
    td[contenteditable="true"]:focus{
      background:var(--white);border-color:var(--c1);outline:none;
      box-shadow:0 0 0 3px rgba(91,127,255,.14);transform:scale(1.01);
    }

    select,input[type="date"]{
      width:100%;padding:8px 12px;border-radius:var(--r-md);
      border:2px solid rgba(91,127,255,.15);background:linear-gradient(145deg,var(--surface),#eef2ff);
      font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;color:var(--text);outline:none;
      transition:.2s;
      box-shadow:inset 0 2px 4px rgba(91,127,255,.06),0 2px 0 0 rgba(91,127,255,.08);
    }
    select:focus,input[type="date"]:focus{border-color:var(--c1);box-shadow:0 0 0 3px rgba(91,127,255,.12);}

    @media print{.action-bar,.btn-danger,.btn{display:none!important;}.main-wrapper{box-shadow:none!important;border:none!important;padding:0;}td[contenteditable="true"]{background:none;padding:0;}}
  </style>
</head>
<body>
<div class="main-wrapper">
  <div class="page-header">
    <h1>HSG Project Monitoring</h1>
    <p>Portfolio Tracking &amp; Fiscal Management</p>
  </div>

  <div class="summary-grid">
    <div class="summary-card card-total"><h3>Total Portfolio ABC</h3><div class="amount" id="totalABC">₱0.00</div></div>
    <div class="summary-card card-svp"><h3>SVP Total</h3><div class="amount" id="svpABC">₱0.00</div></div>
    <div class="summary-card card-shop"><h3>Shopping Total</h3><div class="amount" id="shoppingABC">₱0.00</div></div>
    <div class="summary-card card-nego"><h3>Negotiated Total</h3><div class="amount" id="negotiatedABC">₱0.00</div></div>
  </div>

  <div class="action-bar">
    <input type="text" id="searchInput" class="search-bar" placeholder="🔍  Search by description or remarks…">
    <div class="btn-group">
      <button id="addEmptyRowBtn" class="btn btn-outline"><i class="fas fa-plus"></i> Add Entry</button>
      <button id="updateRowBtn" class="btn btn-primary"><i class="fas fa-save"></i> Sync to Database</button>
      <button onclick="window.print()" class="btn btn-outline"><i class="fas fa-print"></i> Print</button>
    </div>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th class="col-id">#</th>
          <th class="col-date">Date Out</th>
          <th class="col-desc">Item Description</th>
          <th class="col-mode">Procurement Mode</th>
          <th class="col-money">ABC</th>
          <th class="col-money">Bid Amount</th>
          <th class="col-remarks">Remarks</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  const SUPABASE_URL="https://jdzfxfriydakuqegtahq.supabase.co";
  const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkemZ4ZnJpeWRha3VxZWd0YWhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjEwODU0MTEsImV4cCI6MjA3NjY2MTQxMX0.8uuX1PUSKOg03AuZeJJ5HxSUhM-gqapTclMn2A3tD4U";
  const supabaseHSG=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  const tableBody=document.getElementById("tableBody");
  const searchInput=document.getElementById("searchInput");
  let masterData=[];

  function formatCurrency(num){return new Intl.NumberFormat('en-PH',{style:'currency',currency:'PHP'}).format(num||0);}

  async function loadData(){
    const{data,error}=await supabaseHSG.from("hsg_project_monitoring").select("*").order("id",{ascending:true});
    if(error)return console.error(error);
    masterData=data;renderFiltered();
  }

  function renderFiltered(){
    const query=searchInput.value.toLowerCase();
    const filtered=masterData.filter(row=>(row.item_description||"").toLowerCase().includes(query)||(row.remarks||"").toLowerCase().includes(query));
    tableBody.innerHTML="";
    let totals={abc:0,svp:0,shop:0,nego:0};
    filtered.forEach((row,i)=>{
      const val=parseFloat(row.abc)||0;totals.abc+=val;
      if(row.mode_of_procurement==="Small Value Procurement")totals.svp+=val;
      if(row.mode_of_procurement==="Shopping")totals.shop+=val;
      if(row.mode_of_procurement==="Negotiated")totals.nego+=val;
      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td class="col-id" style="font-weight:800;color:var(--muted);">${i+1}</td>
        <td class="col-date"><input type="date" value="${row.date_out||""}"></td>
        <td class="col-desc" contenteditable="true">${row.item_description||""}</td>
        <td class="col-mode"><select>
          <option value="">-- Mode --</option>
          <option ${row.mode_of_procurement==="Small Value Procurement"?"selected":""}>Small Value Procurement</option>
          <option ${row.mode_of_procurement==="Shopping"?"selected":""}>Shopping</option>
          <option ${row.mode_of_procurement==="Negotiated"?"selected":""}>Negotiated</option>
        </select></td>
        <td class="col-money" contenteditable="true" style="font-weight:800;color:var(--c1);">${row.abc||""}</td>
        <td class="col-money" contenteditable="true" style="color:var(--c3);font-weight:800;">${row.bid_amount||""}</td>
        <td class="col-remarks" contenteditable="true">${row.remarks||""}</td>
        <td class="col-action"><button class="btn btn-danger delete-btn" data-id="${row.id}"><i class="fas fa-trash"></i></button></td>`;
      tableBody.appendChild(tr);
    });
    document.getElementById("totalABC").textContent=formatCurrency(totals.abc);
    document.getElementById("svpABC").textContent=formatCurrency(totals.svp);
    document.getElementById("shoppingABC").textContent=formatCurrency(totals.shop);
    document.getElementById("negotiatedABC").textContent=formatCurrency(totals.nego);
  }

  searchInput.oninput=renderFiltered;

  document.getElementById("updateRowBtn").onclick=async()=>{
    const rows=tableBody.querySelectorAll("tr");
    for(let row of rows){
      const id=row.querySelector(".delete-btn").dataset.id;
      const cells=row.querySelectorAll("td");
      const payload={date_out:cells[1].querySelector("input").value,item_description:cells[2].innerText.trim(),mode_of_procurement:cells[3].querySelector("select").value,abc:cells[4].innerText.trim(),bid_amount:cells[5].innerText.trim(),remarks:cells[6].innerText.trim()};
      if(id)await supabaseHSG.from("hsg_project_monitoring").update(payload).eq("id",id);
      else if(payload.item_description)await supabaseHSG.from("hsg_project_monitoring").insert([payload]);
    }
    alert("Portfolio updated successfully.");loadData();
  };

  document.getElementById("addEmptyRowBtn").onclick=()=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td class="col-id" style="font-weight:800;color:var(--muted);">*</td><td class="col-date"><input type="date"></td><td class="col-desc" contenteditable="true"></td><td class="col-mode"><select><option value="">-- Mode --</option><option>Small Value Procurement</option><option>Shopping</option><option>Negotiated</option></select></td><td class="col-money" contenteditable="true"></td><td class="col-money" contenteditable="true"></td><td class="col-remarks" contenteditable="true"></td><td class="col-action"><button class="btn btn-danger delete-btn"><i class="fas fa-trash"></i></button></td>`;
    tableBody.prepend(tr);
  };

  tableBody.onclick=async e=>{
    if(e.target.closest(".delete-btn")){
      const btn=e.target.closest(".delete-btn");
      if(btn.dataset.id&&confirm("Delete record permanently?")){await supabaseHSG.from("hsg_project_monitoring").delete().eq("id",btn.dataset.id);loadData();}
      else if(!btn.dataset.id)btn.closest("tr").remove();
    }
  };

  loadData();
</script>
</body>
</html>
